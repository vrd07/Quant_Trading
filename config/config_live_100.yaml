# Live Trading Environment Configuration
# $100 Account Size — Micro-account for testing strategies with minimal capital
# Rules: 5% daily loss ($5), 7% max trailing drawdown ($7)
# Risk per trade: $1 (1.0%) — 0.01 lot XAUUSD × 10 pip stop = $1
# Target profit:  $2.50 per trade (RR 2.5)
# News Trading: Restricted (±5 min around high-impact news)
# Overnight & Weekend Holding: Allowed
#
# Audit-hardened config (Apr 2026):
#   - Mini Medallion DISABLED (negative expectancy)
#   - Kalman long_only (SELL side loses money on Gold)
#   - Pre-trade daily loss budget gate (85%)
#   - Tightened circuit breaker (3 losses / 30 min)

environment: live

account:
  initial_balance: 100.0
  currency: USD
  leverage: 100

symbols:
  XAUUSD:
    enabled: true
    pip_value: 0.01
    min_lot: 0.01
    max_lot: 0.01
    lot_step: 0.01
    value_per_lot: 100
    commission_per_lot: 0.0
    leverage: 30
    min_stops_distance: 1.0
    max_spread: 3.5

  BTCUSD:
    enabled: false
    pip_value: 0.1
    min_lot: 0.01
    max_lot: 0.01
    lot_step: 0.01
    value_per_lot: 1
    commission_per_lot: 0.0
    leverage: 2
    min_stops_distance: 5.0
    max_spread: 15.0

  EURUSD:
    enabled: false
    pip_value: 0.00001
    min_lot: 0.01
    max_lot: 0.01
    lot_step: 0.01
    value_per_lot: 100000
    commission_per_lot: 0.0
    leverage: 100
    min_stops_distance: 0.00050
    max_spread: 0.00030

  US30:
    enabled: false
    pip_value: 1.0
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
    value_per_lot: 1
    commission_per_lot: 0.0
    leverage: 20
    max_spread: 5.0

  USOIL:
    enabled: false
    pip_value: 0.01
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
    value_per_lot: 1000
    commission_per_lot: 0.0
    leverage: 10
    max_spread: 0.05

risk:
  # $100 Account Risk Parameters
  max_drawdown_pct: 0.07          # 7% Max Overall/Trailing Drawdown ($7)
  max_daily_loss_pct: 0.05        # 5% Max Daily Loss ($5)
  bypass_drawdown_limit: false    # Enforce drawdown limit

  # $1 risk per trade = 1.0% of $100
  # Basis: 0.01 lot XAUUSD × 10 pip stop × $10/pip/lot = $1
  risk_per_trade_pct: 0.01        # 1.0% = $1 per trade

  # ABSOLUTE DOLLAR LOSS/PROFIT LIMITS
  absolute_max_loss_usd: 5        # Daily loss limit ($100 × 5%)
  max_drawdown_usd: 7             # Overall drawdown limit ($100 × 7%)
  max_daily_profit_usd: 5         # Stop trading for the day once $5 profit hit
  daily_loss_budget_safety_pct: 0.85  # Pre-trade budget gate: reject if worst-case SL hit
                                      # would push daily loss past 85% of $5 = $4.25

  max_positions: 1                # Micro account — 1 position at a time
  max_daily_trades: 8             # Conservative: limited trades on micro account
  max_exposure_per_symbol_pct: 5.0
  max_daily_wins: 4               # Stop trading once 4 wins hit

  position_sizing:
    method: fixed
    fixed_lots:
      XAUUSD: 0.01
      default: 0.01
  circuit_breaker:
    enabled: true
    max_consecutive_losses: 3      # Tightened — audit standard
    cooldown_minutes: 30           # 30 min pause after kill switch
    loss_pause_consecutive: 2      # Soft pause after 2 consecutive losses
    loss_pause_minutes: 30         # 30 min cooldown

  trailing_stop:
    enabled: true
    breakeven_atr_mult: 1.2
    lock_atr_mult: 2.0
    lock_fraction: 0.5
    ml_exhaustion_factor: 0.8

strategies:
  signal_cooldown_minutes: 5
  primary_timeframe: 1m
  min_bars_required: 5

  regime_filter:
    enabled: true
    adx_period: 14
    adx_trend_threshold: 25
    adx_range_threshold: 20
    atr_period: 14
    atr_ma_period: 20
    use_hurst: true
    hurst_period: 100
    hurst_trend_threshold: 0.55
    hurst_range_threshold: 0.45

  breakout:
    enabled: false               # Disabled on $100 — too small for 3-strategy portfolio
    timeframe: 5m
    donchian_period: 12             # v3: shorter channel (60 min) — faster breakout detection
    rr_ratio: 3.0                   # v3: wider TP — gold trends well, capture more per winner
    only_in_regime: TREND
    atr_stop_multiplier: 2.0        # v3: back to 2.0 — 1.5 was too tight, stops hit too early
    adx_min_threshold: 20           # v3: back to 20 — quality over quantity
    min_body_atr_ratio: 0.30        # v3: back to 0.30 — ensures quality breakout bars
    volume_confirmation: false
    rsi_overbought: 78              # v3: widened from 75 — let strong trends run
    rsi_oversold: 22                # v3: widened from 25
    atr_spike_mult: 1.8             # v3: relaxed from 1.5 — gold is volatile, allow more
    cooldown_bars: 2                # v3: reduced from 4 — more trade frequency
    bb_squeeze_enabled: true
    bb_squeeze_period: 20
    bb_squeeze_percentile: 70       # v3: relaxed from 60 — less restrictive entry
    bb_squeeze_lookback: 50
    htf_trend_enabled: true
    htf_ema_period: 21
    session_filter_enabled: true
    allowed_sessions: [[4,4],[7,8],[22,22]]  # v3: ONLY profitable hours
    close_position_pct: 0.35
    macd_confirmation: true
    ema_confirm_enabled: true
    ema_fast_period: 9
    ema_slow_period: 21

  mean_reversion:
    enabled: false
    zscore_lookback: 20
    entry_threshold: 2.0
    exit_threshold: 0.5
    stop_threshold: 3.0
    rr_ratio: 2.5
    only_in_regime: RANGE
    mtf_confirmation: false

  vwap:
    enabled: false
    timeframe: 1m
    band_std_mult: 2.0
    partial_std_mult: 0.5
    stop_atr_multiplier: 1.5
    atr_period: 14
    min_volume_ratio: 1.0
    rsi_oversold_entry: 30
    rsi_overbought_entry: 70
    cci_oversold_entry: -120
    cci_overbought_entry: 120
    cci_period: 20
    only_in_regime: RANGE

  # ── PRIMARY STRATEGY ──────────────────────────────────────────────────────
  # Momentum v3: Session-filtered, wider SL, optimized for profitability
  momentum:
    enabled: true
    timeframe: 5m
    rsi_period: 14
    ema_period: 20
    rr_ratio: 2.0             # v3: lowered from 2.5 — improves TP hit rate
    atr_stop_multiplier: 2.0  # v3: widened from 1.5 — reduces false SL hits
    rsi_bull_threshold: 53
    rsi_bear_threshold: 47
    rsi_overbought: 78
    rsi_oversold: 22
    adx_min_threshold: 22       # v3: raised from 20
    volume_confirmation: false
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    ema_fast: 9
    ema_mid: 21
    ema_slow: 30
    rsi_slope_bars: 3
    min_signal_strength: 0.60   # v3: raised from 0.50
    min_signal_strength_sell: 0.65
    only_in_regime: TREND
    session_filter_enabled: true
    allowed_hours: [1, 3, 4, 5, 7, 8, 10, 16, 17, 22]

  # ── SECONDARY STRATEGY ────────────────────────────────────────────────────
  kalman_regime:
    enabled: true
    timeframe: 15m
    long_only: true                 # SELL side lost -$3,106 even with MACD filters. Long-only.
    kalman_q: 0.00001
    kalman_r: 0.01
    rv_window: 20
    rv_ma_window: 100
    zscore_window: 20
    entry_threshold: 2.0            # v2: lowered from 2.5 — more range entries
    trend_adx_min: 20               # v2: lowered from 22
    kalman_confirm_bars: 2          # Keep 2-bar confirmation (proven in v1)
    min_signal_strength: 0.50
    cooldown_bars: 2                # v2: 30 min cooldown (was 30 bars = 7.5hr!)
    atr_period: 14
    sl_atr_multiplier: 1.5
    tp_atr_multiplier: 8.0          # v2: 8x ATR TP — let big trends run
    news_filter: true
    # v2: session filter only — EMA/MACD disabled (hurt WR in best hours)
    session_filter_enabled: true
    allowed_sessions: [[1,1],[3,6],[15,15],[20,21]]
    ema_confirm_enabled: false
    macd_confirmation: false
    kalman_accel_enabled: false
    stoch_confirm_enabled: false
    range_rsi_buy: 42
    range_rsi_sell: 58

  # Mini Medallion v2: +31% return, PF 1.59, DD 4.3% (backtest Jan 2025–Mar 2026)
  # v2 changes: long-only, session filter, lower threshold, higher RR, ADX filter
  mini_medallion:
    enabled: false
    timeframe: 5m
    score_threshold: 2.5            # v2: lowered from 5.0 — 7 signals max ~7.6, need more trades
    cooldown_bars: 15               # v2: 75 min cooldown (was 150 min) — more trades in good sessions
    risk_atr_multiplier: 1.5
    rr_ratio: 3.0                   # v2: raised from 2.0 — let winners run, compensate for <50% WR
    long_only: true                 # v2: SELL side lost -$8.3K — gold upward bias
    session_filter_enabled: true    # v2: only trade profitable hours
    allowed_hours: [3, 4, 5, 6, 7, 9, 17]  # v2: only net-profitable hours from backtest
    adx_min_threshold: 20           # v2: require trending market for higher conviction
    min_signal_strength: 0.0        # v2: no min strength — low and high both profitable
    weights:
      mean_reversion: 1.0
      momentum_burst: 1.2           # v2: raised — momentum is key for long-only trend following
      volatility_expansion: 1.3     # v2: raised — breakout confirmation
      order_flow: 1.1
      liquidity_sweep: 1.5          # v2: raised — highest edge signal (ICT sweep + rejection)
      market_regime: 1.2            # v2: raised — regime alignment critical
      volatility_regime: 0.6        # v2: lowered — noisy signal

  # ── STRUCTURE BREAK + RETEST (SBR) ─────────────────────────────────
  # v2: +5.30%, PF 1.88, DD 1.61% — EMA trend + session filter + strength gate
  sbr:
    enabled: true
    timeframe: 5m
    lookback_period: 20
    retest_tolerance_atr: 0.4       # Tighter retest zone (was 0.5)
    min_rejection_ratio: 0.55       # Slightly relaxed to catch more valid retests
    retest_window_bars: 20          # Tighter window (was 30) — stale breaks fail
    adx_min_threshold: 22           # Slightly higher ADX floor
    adx_max_threshold: 55           # Cap ADX — overheated trends whipsaw
    rsi_overbought: 70              # Tighter RSI bands
    rsi_oversold: 30
    atr_stop_multiplier: 1.2        # Tighter SL (was 1.5) — broken level is strong invalidation
    rr_ratio: 2.0                   # Lowered from 2.5 — improves TP hit rate
    cooldown_bars: 8                # Fast re-entry in quality sessions
    long_only: false
    only_in_regime: TREND
    # v2 filters
    ema_trend_period: 50            # 50-EMA trend alignment required
    min_strength: 0.65              # Moderate strength gate
    session_hours: [5, 6, 7, 13, 16, 17, 22]  # High-WR hours: London open, NY afternoon, late session

  # ── SUPPLY & DEMAND ZONE STRATEGY ─────────────────────────────────────────
  # Disabled by default — backtest before enabling live.
  supply_demand:
    enabled: false
    timeframe: 5m
    # Zone formation — loosened to surface more setups on 5m XAUUSD
    min_impulse_atr_mult: 1.6   # Was 2.5
    zone_lookback_bars: 4
    zone_max_age_bars: 80
    max_active_zones: 5
    # Entry confirmation — relaxed but still quality-gated
    zone_touch_tolerance_atr: 0.5
    min_rejection_ratio: 0.40   # Was 0.55
    adx_min_threshold: 14       # Was 18
    rsi_overbought: 78
    rsi_oversold: 22
    ema_trend_period: 34
    long_only: false
    session_hours: [4, 5, 6, 7, 8, 9, 12, 13, 14, 15, 16, 17, 18, 19, 22]
    cooldown_bars: 4

trading_hours:
  sessions:
    # ── 24/7 ALL STRATEGIES ───────────────────────────────────────────────────
    - name: all_day
      start: "00:00"
      end: "23:59"
      enabled: true
      lot_size_multiplier: 1.0
      strategies: [momentum, kalman_regime, sbr]

  news_filter:
    enabled: true
    csv_path: news/2026-04-12_news.csv
    currency: USD
    impacts:
      - high
      - red
    buffer_min: 5
    timezone: Asia/Kolkata

monitoring:
  log_level: INFO
  state_save_interval_sec: 10
  enable_console_logging: true
  alerts:
    kill_switch: true
    daily_loss_pct: 0.04

data:
  timeframes:
    - 1m
    - 5m
    - 15m
    - 1h
  history_bars: 1000
  tick_buffer_size: 5000

portfolio:
  reconciliation_interval_sec: 30

file_bridge:
  enabled: true
  data_dir: "~/Library/Application Support/net.metaquotes.wine.metatrader5/drive_c/users/user/AppData/Roaming/MetaQuotes/Terminal/Common/Files"
  check_interval_ms: 100

shutdown:
  close_all_positions: true
  save_state: true
