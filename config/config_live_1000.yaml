# Live Trading Environment Configuration
# $1,000 Account Size
# Rules: 2.5% daily loss ($25), 7% max trailing drawdown ($60)
# Risk per trade: $5 (0.50%) — 0.01 lot XAUUSD × 50 pip stop = $5
# Target profit:  $12.50 per trade (RR 2.5)
# News Trading: Restricted (±5 min around high-impact news)
# Overnight & Weekend Holding: Allowed
#
# Audit-hardened config (Apr 2026):
#   - Mini Medallion DISABLED (negative expectancy)
#   - Kalman long_only (SELL side loses money on Gold)
#   - Pre-trade daily loss budget gate (85%)
#   - Tightened circuit breaker (3 losses / 30 min)

environment: live

account:
  initial_balance: 1000.0
  currency: USD
  leverage: 100

symbols:
  XAUUSD:
    enabled: true
    pip_value: 0.01
    min_lot: 0.01
    max_lot: 0.01
    lot_step: 0.01
    value_per_lot: 100
    commission_per_lot: 0.0
    leverage: 30
    min_stops_distance: 1.0
    max_spread: 3.5

  BTCUSD:
    enabled: false
    pip_value: 0.1
    min_lot: 0.01
    max_lot: 0.01
    lot_step: 0.01
    value_per_lot: 1
    commission_per_lot: 0.0
    leverage: 2
    min_stops_distance: 5.0
    max_spread: 15.0

  EURUSD:
    enabled: false
    pip_value: 0.00001
    min_lot: 0.01
    max_lot: 0.01
    lot_step: 0.01
    value_per_lot: 100000
    commission_per_lot: 0.0
    leverage: 100
    min_stops_distance: 0.00050
    max_spread: 0.00030

  US30:
    enabled: false
    pip_value: 1.0
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
    value_per_lot: 1
    commission_per_lot: 0.0
    leverage: 20
    max_spread: 5.0

  USOIL:
    enabled: false
    pip_value: 0.01
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
    value_per_lot: 1000
    commission_per_lot: 0.0
    leverage: 10
    max_spread: 0.05

risk:
  # $1,000 Account Risk Parameters
  max_drawdown_pct: 0.07          # 7% Max Overall/Trailing Drawdown ($70)
  max_daily_loss_pct: 0.025       # 2.5% Max Daily Loss ($25)
  bypass_drawdown_limit: false    # Enforce drawdown limit

  # $5 risk per trade = 0.50% of $1,000
  # Basis: 0.01 lot XAUUSD × 50 pip stop × $10/pip/lot = $5
  risk_per_trade_pct: 0.005       # 0.50% = $5 per trade

  # ABSOLUTE DOLLAR LOSS/PROFIT LIMITS
  absolute_max_loss_usd: 25       # Daily loss limit ($1k × 2.5%)
  max_drawdown_usd: 60            # Overall drawdown limit ($1k × ~6%)
  max_daily_profit_usd: 30        # Stop trading for the day once $30 profit hit
  daily_loss_budget_safety_pct: 0.85  # Pre-trade budget gate: reject if worst-case SL hit
                                      # would push daily loss past 85% of $25 = $21.25

  max_positions: 1                # Small account — 1 position at a time
  max_daily_trades: 10            # Conservative trade count
  max_exposure_per_symbol_pct: 5.0
  max_daily_wins: 6               # Stop trading once 6 wins hit

  position_sizing:
    method: fixed
    fixed_lots:
      XAUUSD: 0.01
      default: 0.01
  circuit_breaker:
    enabled: true
    max_consecutive_losses: 3      # Tightened — audit standard
    cooldown_minutes: 30
    loss_pause_consecutive: 2
    loss_pause_minutes: 30

  trailing_stop:
    enabled: true
    breakeven_atr_mult: 1.2
    lock_atr_mult: 2.0
    lock_fraction: 0.5
    ml_exhaustion_factor: 0.8

strategies:
  signal_cooldown_minutes: 5
  primary_timeframe: 1m
  min_bars_required: 5

  regime_filter:
    enabled: true
    adx_period: 14
    adx_trend_threshold: 25
    adx_range_threshold: 20
    atr_period: 14
    atr_ma_period: 20
    use_hurst: true
    hurst_period: 100
    hurst_trend_threshold: 0.55
    hurst_range_threshold: 0.45

  breakout:
    enabled: false               # Disabled on $1K — conservative 2-strategy portfolio
    timeframe: 5m
    donchian_period: 20
    rr_ratio: 2.0
    only_in_regime: TREND
    atr_stop_multiplier: 2.5
    adx_min_threshold: 20
    min_body_atr_ratio: 0.30
    volume_confirmation: false
    rsi_overbought: 75
    rsi_oversold: 25
    atr_spike_mult: 1.5
    cooldown_bars: 8

  mean_reversion:
    enabled: false
    zscore_lookback: 20
    entry_threshold: 2.0
    exit_threshold: 0.5
    stop_threshold: 3.0
    rr_ratio: 2.5
    only_in_regime: RANGE
    mtf_confirmation: false

  vwap:
    enabled: false
    timeframe: 1m
    band_std_mult: 2.0
    partial_std_mult: 0.5
    stop_atr_multiplier: 1.5
    atr_period: 14
    min_volume_ratio: 1.0
    rsi_oversold_entry: 30
    rsi_overbought_entry: 70
    cci_oversold_entry: -120
    cci_overbought_entry: 120
    cci_period: 20
    only_in_regime: RANGE

  # ── PRIMARY STRATEGY ──────────────────────────────────────────────────────
  momentum:
    enabled: true
    timeframe: 5m
    rsi_period: 14
    ema_period: 20
    rr_ratio: 2.5
    atr_stop_multiplier: 1.5
    rsi_bull_threshold: 55
    rsi_bear_threshold: 45
    rsi_overbought: 78
    rsi_oversold: 22
    adx_min_threshold: 25
    volume_confirmation: false
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    ema_fast: 9
    ema_mid: 21
    ema_slow: 30
    rsi_slope_bars: 3
    min_signal_strength: 0.65
    only_in_regime: TREND

  # ── SECONDARY STRATEGY ────────────────────────────────────────────────────
  kalman_regime:
    enabled: true
    timeframe: 15m
    long_only: true                 # Audit: SELL side loses money on Gold
    kalman_q: 0.00001
    kalman_r: 0.01
    rv_window: 20
    rv_ma_window: 100
    zscore_window: 20
    entry_threshold: 2.5
    trend_adx_min: 28
    kalman_confirm_bars: 3
    min_signal_strength: 0.60
    cooldown_bars: 80
    atr_period: 14
    sl_atr_multiplier: 1.5
    tp_atr_multiplier: 4.0
    news_filter: true

  # ── DISABLED ───────────────────────────────────────────────────────────────
  mini_medallion:
    enabled: false                  # Disabled — negative expectancy confirmed
    timeframe: 1m
    score_threshold: 5.0
    cooldown_bars: 30
    risk_atr_multiplier: 1.5
    rr_ratio: 2.0
    weights:
      mean_reversion: 1.0
      momentum_burst: 0.8
      volatility_expansion: 1.2
      vwap_reversion: 0.9
      order_flow: 1.1
      liquidity_sweep: 1.3
      lead_lag: 0.7
      market_regime: 1.0
      session_volatility: 0.6
      volatility_spike: 0.8

  # ── STRUCTURE BREAK + RETEST (SBR) ─────────────────────────────────
  # Trades confirmed retests of broken Donchian channel structure.
  # Backtest (50K, Jan 2025–Mar 2026): +0.79%, PF 1.03, DD 4.07%, 708 trades
  sbr:
    enabled: true
    timeframe: 5m
    lookback_period: 20
    retest_tolerance_atr: 0.5
    min_rejection_ratio: 0.6
    retest_window_bars: 30
    adx_min_threshold: 20
    rsi_overbought: 75
    rsi_oversold: 25
    atr_stop_multiplier: 1.5
    rr_ratio: 2.5
    cooldown_bars: 10
    long_only: false
    only_in_regime: TREND

trading_hours:
  sessions:
    # ── 24/7 ALL STRATEGIES ───────────────────────────────────────────────────
    - name: all_day
      start: "00:00"
      end: "23:59"
      enabled: true
      lot_size_multiplier: 1.0
      strategies: [momentum, kalman_regime, sbr]

  news_filter:
    enabled: true
    csv_path: news/2026-04-03_news.csv
    currency: USD
    impacts:
      - high
      - red
    buffer_min: 5
    timezone: Asia/Kolkata

monitoring:
  log_level: INFO
  state_save_interval_sec: 10
  enable_console_logging: true
  alerts:
    kill_switch: true
    daily_loss_pct: 0.02

data:
  timeframes:
    - 1m
    - 5m
    - 15m
    - 1h
  history_bars: 1000
  tick_buffer_size: 5000

portfolio:
  reconciliation_interval_sec: 30

file_bridge:
  enabled: true
  data_dir: "~/Library/Application Support/net.metaquotes.wine.metatrader5/drive_c/users/user/AppData/Roaming/MetaQuotes/Terminal/Common/Files"
  check_interval_ms: 100

shutdown:
  close_all_positions: true
  save_state: true
