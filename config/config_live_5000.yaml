# Live Trading Environment Configuration
# $5,000 Account Size
# Rules: 3% daily loss ($150), 6% max trailing drawdown ($300)
# Risk per trade: $15 (0.3%) — 0.02 lot XAUUSD × 75 pip stop = $15
# Target profit:  $30–$45 per trade (RR 2.0–3.0, set at 2.5 = $37.50)
# News Trading: Restricted (±5 min around high-impact news)
# Overnight & Weekend Holding: Allowed

environment: live

account:
  initial_balance: 1000.0
  currency: USD
  leverage: 100  # Default (FX). Symbol-specific leverage handled below.

symbols:
  XAUUSD:
    enabled: true
    pip_value: 0.01
    min_lot: 0.02             # Fixed 0.02 lots (0.02 × 75 pips × $10/pip/lot = $15 risk)
    max_lot: 0.02             # Fixed 0.02 lots — no scaling beyond this
    lot_step: 0.01
    value_per_lot: 100
    commission_per_lot: 0.0
    leverage: 30              # Metals 1:30

  BTCUSD:
    enabled: false
    pip_value: 0.1
    min_lot: 0.01
    max_lot: 2.0
    lot_step: 0.01
    value_per_lot: 1
    commission_per_lot: 0.0
    leverage: 2               # Crypto 1:2

  EURUSD:
    enabled: false
    pip_value: 0.00001
    min_lot: 0.01
    max_lot: 100.0
    lot_step: 0.01
    value_per_lot: 100000
    commission_per_lot: 0.0
    leverage: 100             # FX 1:100

  US30:
    enabled: false
    pip_value: 1.0
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
    value_per_lot: 1
    commission_per_lot: 0.0
    leverage: 20              # Indices 1:20

  USOIL:
    enabled: false
    pip_value: 0.01
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
    value_per_lot: 1000
    commission_per_lot: 0.0
    leverage: 10              # Energies 1:10

risk:
  # $5,000 Account Risk Parameters
  max_drawdown_pct: 0.07          # 7% Max Overall/Trailing Drawdown ($70)
  max_daily_loss_pct: 0.025       # 2.5% Max Daily Loss ($125)

  # $15 risk per trade = 0.30% of $5,000
  # Basis: 0.02 lot XAUUSD × 75 pip stop × $10/pip/lot = $15
  risk_per_trade_pct: 0.003       # 0.30% = $15 per trade

  # ABSOLUTE DOLLAR LOSS/PROFIT LIMITS
  absolute_max_loss_usd: 125      # Daily loss limit ($5k × 2.5%)
  max_drawdown_usd: 70            # Overall drawdown limit ($70)
  max_daily_profit_usd: 120       # Stop trading for the day once $120 profit hit (~3-4 winning trades)

  max_positions: 2
  max_daily_trades: 50
  max_exposure_per_symbol_pct: 5.0
  max_daily_wins: 4               # Stop trading once 4 wins hit ($120+ target)

  position_sizing:
    method: fixed_lot
    fixed_lot: 0.02

  circuit_breaker:
    enabled: true
    max_consecutive_losses: 5      # Kill switch (hard stop)
    cooldown_minutes: 15
    loss_pause_consecutive: 2      # Soft pause after 2 consecutive losses
    loss_pause_minutes: 30         # Pause for 30 minutes then resume

  trailing_stop:
    enabled: true
    breakeven_atr_mult: 0.5        # Move SL to breakeven at +0.5× risk distance
    lock_atr_mult: 1.5             # Move SL to partial lock at +1.5× risk distance
    lock_fraction: 0.5             # Lock in 50% of original risk at stage 2
    time_stop_minutes: 45          # Close position if open for more than 45 minutes

  # Session windows: only trade London open (7-9am) and NY open (12-2pm UTC)
  # (enforced by trading_hours sessions below)

strategies:
  signal_cooldown_minutes: 5
  primary_timeframe: 1m
  min_bars_required: 5              # Reduced from 10 so 5m strategies activate faster

  regime_filter:
    enabled: true
    adx_period: 14
    adx_trend_threshold: 25
    adx_range_threshold: 20
    atr_period: 14
    atr_ma_period: 20
    use_hurst: true
    hurst_period: 100
    hurst_trend_threshold: 0.55
    hurst_range_threshold: 0.45

  breakout:
    enabled: true
    timeframe: 5m                 # 5m candles — less noise than 1m
    donchian_period: 20
    confirmation_bars: 1
    rr_ratio: 2.5             # $15 risk × 2.5 = $37.50 target (mid of $30–$45 range)
    only_in_regime: TREND
    mtf_confirmation: true
    atr_stop_multiplier: 1.5  # Targets ~45 pip stop on XAUUSD 1m
    adx_min_threshold: 25
    volume_confirmation: true
    volume_ratio_min: 1.2
    rsi_overbought: 75
    rsi_oversold: 25
    bb_squeeze_lookback: 10       # Reduced from 20 → min_bars = 35 (was 45, was blocking with 44 bars!)
    stoch_overbought: 80
    stoch_oversold: 20
    min_signal_strength: 0.65

  mean_reversion:
    enabled: false               # DISABLED: Too risky for prop firm challenge — XAUUSD trends strongly
    zscore_lookback: 20
    entry_threshold: 2.0
    exit_threshold: 0.5
    stop_threshold: 3.0
    rr_ratio: 2.5             # $15 risk × 2.5 = $37.50 target
    only_in_regime: RANGE
    mtf_confirmation: false

  vwap:
    enabled: true
    timeframe: 1m                 # VWAP works best on 1m (fine-grained entries)
    atr_multiplier: 1.5
    stop_atr_multiplier: 1.5  # Targets ~45 pip stop on XAUUSD 1m
    atr_period: 14
    min_volume_ratio: 1.0
    rsi_oversold_entry: 35
    rsi_overbought_entry: 65
    cci_oversold_entry: -100
    cci_overbought_entry: 100
    cci_period: 20
    only_in_regime: RANGE

  momentum:
    enabled: true
    timeframe: 5m                 # 5m candles — avoids 1m noise in EMA stack
    rsi_period: 14
    ema_period: 20
    rr_ratio: 2.5             # $15 risk × 2.5 = $37.50 target
    atr_stop_multiplier: 1.5  # Targets ~45 pip stop on XAUUSD 1m
    rsi_bull_threshold: 50
    rsi_bear_threshold: 50
    rsi_overbought: 75
    rsi_oversold: 25
    adx_min_threshold: 25
    volume_confirmation: true
    volume_ratio_min: 1.0
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    ema_fast: 9
    ema_mid: 21
    ema_slow: 30                  # Reduced from 50 → min_bars = 40 (was 55, was blocking with 44 bars!)
    rsi_slope_bars: 3
    min_signal_strength: 0.65
    only_in_regime: TREND

    kalman_regime:
      enabled: true
      timeframe: 15m                # 15m candles — smoother Kalman trend detection
      kalman_q: 0.00001
      kalman_r: 0.01
      rv_window: 20
      rv_ma_window: 100
      zscore_window: 20
      entry_threshold: 1.5          # Reduced from 2.5 to 1.5 to trigger trades more reliably in chop
      trend_adx_min: 22
      kalman_confirm_bars: 2
      min_signal_strength: 0.50
      atr_period: 14
      sl_atr_multiplier: 1.5    # Targets ~45 pip stop on XAUUSD 1m
      tp_atr_multiplier: 5.0    # $15 risk × 2.5x via ATR-distance (sl × 2.0 = tp × 2.5 effective RR)
      news_filter: true

    mini_medallion:
      enabled: true
      timeframe: 1m
      score_threshold: 3.0
      risk_atr_multiplier: 1.0  # Stop loss at 1x ATR based on instruction specs
      rr_ratio: 1.5             # Take profit at 1.5x ATR
      weights:
        mean_reversion: 1.0
        momentum_burst: 0.8
        volatility_expansion: 1.2
        vwap_reversion: 0.9
        order_flow: 1.1
        liquidity_sweep: 1.3
        lead_lag: 0.7
        market_regime: 1.0
        session_volatility: 0.6
        volatility_spike: 0.8

trading_hours:
  # Friday cutoff: no NEW trades after this UTC time on Fridays (weekend gap protection)
  friday_cutoff_utc: "19:00"

  sessions:
    # ── ASIAN SESSION ─────────────────────────────────────────────────────────
    # Tokyo/Singapore. Gold drifts slowly. Lower volume → use HALF lot size.
    # ML=TREND  → breakout + kalman fire on directional drifts
    # ML=RANGE  → vwap + kalman trade mean-reversion quietly
    # Times UTC | IST: 07:00-11:30
    - name: asian
      start: "01:30"             # 07:00 IST
      end: "06:00"               # 11:30 IST
      enabled: true
      lot_size_multiplier: 0.5   # ← HALF size in thin Asian market (0.01 lots)
      strategies: [breakout, kalman_regime, vwap, mini_medallion]

    # ── LONDON OPEN ───────────────────────────────────────────────────────────
    # 🔥 Highest volatility. Biggest directional breakouts of the day.
    # Full lot size. All trend + range strategies eligible.
    # Times UTC | IST: 12:30-15:00
    - name: london_open
      start: "07:00"             # 12:30 IST
      end: "09:30"               # 15:00 IST
      enabled: true
      lot_size_multiplier: 1.0   # Full size
      strategies: [breakout, momentum, kalman_regime, vwap, mini_medallion]

    # ── LONDON CONTINUATION / NY PRE-MARKET ───────────────────────────────────
    # London still active, NY traders positioning before open.
    # Strong momentum continuations + VWAP reversion from London spike.
    # Times UTC | IST: 15:00-17:30
    - name: london_ny_overlap
      start: "09:30"             # 15:00 IST
      end: "12:00"               # 17:30 IST
      enabled: true
      lot_size_multiplier: 1.0   # Full size — still high liquidity
      strategies: [breakout, momentum, kalman_regime, vwap, mini_medallion]

    # ── NY OPEN / LONDON-NY OVERLAP ───────────────────────────────────────────
    # 🔥 NY session opens. London + NY both active → highest combined liquidity.
    # Best for momentum continuations in the established London direction.
    # Times UTC | IST: 17:30-20:00
    - name: new_york_open
      start: "12:00"             # 17:30 IST
      end: "14:30"               # 20:00 IST
      enabled: true
      lot_size_multiplier: 1.0   # Full size
      strategies: [breakout, momentum, kalman_regime, vwap, mini_medallion]

    # ── NY EVENING / LATE SESSION ─────────────────────────────────────────────
    # Post-NYSE. Lower volume. Clean trends when ML=TREND, noisy otherwise.
    # NOTE: ML override auto-disables breakout/momentum on RANGE days.
    # Times UTC | IST: 20:00 IST → 02:00 IST
    - name: ny_evening
      start: "14:30"             # 20:00 IST
      end: "20:30"               # 02:00 IST next day
      enabled: true
      lot_size_multiplier: 0.75  # Slightly reduced — thinner market
      strategies: [breakout, momentum, kalman_regime, mini_medallion]

  news_filter:
    enabled: true               # RESTRICTED: No trades ±5 min around high-impact news
    csv_path: news/2026-03-04_news.csv
    currency: USD
    impacts:
      - high
      - red
    buffer_min: 5               # 5-minute buffer
    timezone: Asia/Kolkata

monitoring:
  log_level: INFO
  state_save_interval_sec: 10
  enable_console_logging: true

  alerts:
    kill_switch: true
    daily_loss_pct: 0.02        # Alert at 2% daily loss

data:
  timeframes:
    - 1m
    - 5m
    - 15m
    - 1h
  history_bars: 1000
  tick_buffer_size: 5000

portfolio:
  reconciliation_interval_sec: 30

file_bridge:
  enabled: true
  # ── MT5 data directory ──────────────────────────────────────────────────────
  #
  # WINDOWS 11 USERS:
  #   Option A (recommended — works with ANY username including spaces):
  #     Comment out BOTH data_dir lines below. The bot will auto-detect the
  #     correct path using Windows' %APPDATA% environment variable.
  #
  #   Option B (manual — only needed if auto-detect fails):
  #     Uncomment the line below and replace <YourWindowsUsername> with yours.
  #     If your username has spaces (e.g. "Shubham Ghodke"), include them as-is:
  #     data_dir: "C:/Users/Shubham Ghodke/AppData/Roaming/MetaQuotes/Terminal/Common/Files"
  #
  # macOS (MT5 under Wine — active by default):
  data_dir: "~/Library/Application Support/net.metaquotes.wine.metatrader5/drive_c/users/user/AppData/Roaming/MetaQuotes/Terminal/Common/Files"
  check_interval_ms: 100

shutdown:
  close_all_positions: true
  save_state: true
