# Live Trading Environment Configuration
# $5,000 Account Size
# Rules: 3% daily loss ($150), 6% max trailing drawdown ($300)
# Risk per trade: $15 (0.3%) — 0.02 lot XAUUSD × 75 pip stop = $15
# Target profit:  $30–$45 per trade (RR 2.0–3.0, set at 2.5 = $37.50)
# News Trading: Restricted (±5 min around high-impact news)
# Overnight & Weekend Holding: Allowed

environment: live

account:
  initial_balance: 5000.0
  currency: USD
  leverage: 100  # Default (FX). Symbol-specific leverage handled below.

symbols:
  XAUUSD:
    enabled: true
    pip_value: 0.01
    min_lot: 0.02             # System minimum
    max_lot: 0.05             # Increased to allow strategy overrides (up to 0.05)
    lot_step: 0.01
    value_per_lot: 100
    commission_per_lot: 0.0
    leverage: 30              # Metals 1:30
    min_stops_distance: 1.0   # 100 pips min distance for Gold
    max_spread: 3.5           # 35 pips max spread threshold


  BTCUSD:
    enabled: false
    pip_value: 0.1
    min_lot: 0.01
    max_lot: 0.01             # Lowered max limit for crypto margin safety
    lot_step: 0.01
    value_per_lot: 1
    commission_per_lot: 0.0
    leverage: 2               # Crypto 1:2
    min_stops_distance: 5.0   # $5.00 min distance for Bitcoin
    max_spread: 15.0          # $15.00 max spread threshold


  EURUSD:
    enabled: false
    pip_value: 0.00001
    min_lot: 0.01
    max_lot: 0.02
    lot_step: 0.01
    value_per_lot: 100000
    commission_per_lot: 0.0
    leverage: 100             # FX 1:100
    min_stops_distance: 0.00050 # 5 pip min distance
    max_spread: 0.00030       # 3 pips max spread threshold


  US30:
    enabled: false
    pip_value: 1.0
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
    value_per_lot: 1
    commission_per_lot: 0.0
    leverage: 20              # Indices 1:20
    max_spread: 5.0           # 5 points max spread threshold

  USOIL:
    enabled: false
    pip_value: 0.01
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
    value_per_lot: 1000
    commission_per_lot: 0.0
    leverage: 10              # Energies 1:10
    max_spread: 0.05          # 5 cents max spread threshold

risk:
  # $5,000 Account Risk Parameters
  max_drawdown_pct: 0.07          # 7% Max Overall/Trailing Drawdown ($300)
  max_daily_loss_pct: 0.025       # 2.5% Max Daily Loss ($150)
  bypass_drawdown_limit: true     # Bypass the drawdown killswitch permanently

  # $15 risk per trade = 0.30% of $5,000
  # Basis: 0.02 lot XAUUSD × 75 pip stop × $10/pip/lot = $15
  risk_per_trade_pct: 0.003       # 0.30% = $15 per trade

  # ABSOLUTE DOLLAR LOSS/PROFIT LIMITS
  absolute_max_loss_usd: 145      # Daily loss limit ($5k × 3.0%)
  max_drawdown_usd: 295            # Overall drawdown limit ($300)
  max_daily_profit_usd: 260       # Stop trading for the day once $260 profit hit (~7 winning trades)

  max_positions: 2
  max_daily_trades: 50
  max_exposure_per_symbol_pct: 5.0
  max_daily_wins: 8               # Stop trading once 8 wins hit ($250+ target)

  position_sizing:
    method: dynamic_atr
  circuit_breaker:
    enabled: true
    max_consecutive_losses: 5      # Kill switch (hard stop)
    cooldown_minutes: 15
    loss_pause_consecutive: 3      # Soft pause after 2 consecutive losses
    loss_pause_minutes: 15         # Pause for 30 minutes then resume

  trailing_stop:
    enabled: true
    breakeven_atr_mult: 1.2        # Move SL to breakeven at +1.2× risk distance (was 0.5 — too tight, normal noise stopped out trades)
    lock_atr_mult: 2.0             # Move SL to partial lock at +2.0× risk distance (was 1.5)
    lock_fraction: 0.5             # Lock in 50% of original risk at stage 2
    # time_stop_minutes removed — was 45 min, killed 30-59% of trades before TP could be reached
    ml_exhaustion_factor: 0.8      # (ML ONLY) If exhaustion pipeline generates predicted pips, tight_lock 80% of it immediately when reached

  # Session windows: only trade London open (7-9am) and NY open (12-2pm UTC)
  # (enforced by trading_hours sessions below)

strategies:
  signal_cooldown_minutes: 5
  primary_timeframe: 1m
  min_bars_required: 5              # Reduced from 10 so 5m strategies activate faster

  regime_filter:
    enabled: true
    adx_period: 14
    adx_trend_threshold: 25
    adx_range_threshold: 20
    atr_period: 14
    atr_ma_period: 20
    use_hurst: true
    hurst_period: 100
    hurst_trend_threshold: 0.55
    hurst_range_threshold: 0.45

  breakout:
    enabled: true                # Matching 50K config
    timeframe: 5m
    donchian_period: 20
    rr_ratio: 2.0
    only_in_regime: TREND
    atr_stop_multiplier: 2.5
    adx_min_threshold: 20
    min_body_atr_ratio: 0.30
    volume_confirmation: false
    rsi_overbought: 75
    rsi_oversold: 25
    atr_spike_mult: 1.5
    cooldown_bars: 8               # Breaks consecutive loss streaks (from 50K config)

  mean_reversion:
    enabled: false              # -1.63%, PF 0.40, 15% WR — no edge on gold
    zscore_lookback: 20
    entry_threshold: 2.0
    exit_threshold: 0.5
    stop_threshold: 3.0
    rr_ratio: 2.5
    only_in_regime: RANGE
    mtf_confirmation: false

  vwap:
    enabled: false              # -0.98%, PF 0.77 — loses money on trending gold
    timeframe: 1m
    band_std_mult: 2.0
    partial_std_mult: 0.5
    stop_atr_multiplier: 1.5
    atr_period: 14
    min_volume_ratio: 1.0
    rsi_oversold_entry: 30
    rsi_overbought_entry: 70
    cci_oversold_entry: -120
    cci_overbought_entry: 120
    cci_period: 20
    only_in_regime: RANGE

  # ── PRIMARY STRATEGY ──────────────────────────────────────────────────────
  # Momentum: Matching 50K config params
  momentum:
    enabled: true
    timeframe: 5m
    rsi_period: 14
    ema_period: 20
    rr_ratio: 2.5
    atr_stop_multiplier: 1.5
    rsi_bull_threshold: 52       # From 50K config
    rsi_bear_threshold: 48       # From 50K config
    rsi_overbought: 78
    rsi_oversold: 22
    adx_min_threshold: 20        # From 50K config (was 25)
    volume_confirmation: false
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    ema_fast: 9
    ema_mid: 21
    ema_slow: 30
    rsi_slope_bars: 3
    min_signal_strength: 0.50    # From 50K config (was 0.65)
    min_signal_strength_sell: 0.60  # From 50K config — higher bar for shorts
    only_in_regime: TREND

  # ── SECONDARY STRATEGY ────────────────────────────────────────────────────
  # Kalman: Matching 50K config params (with long_only)
  kalman_regime:
    enabled: true
    timeframe: 15m
    long_only: true                 # From 50K config — SELL side loses money on Gold
    kalman_q: 0.00001
    kalman_r: 0.01
    rv_window: 20
    rv_ma_window: 100
    zscore_window: 20
    entry_threshold: 2.5
    trend_adx_min: 22              # From 50K config (was 28)
    kalman_confirm_bars: 2         # From 50K config (was 3)
    min_signal_strength: 0.75      # From 50K config (was 0.60)
    cooldown_bars: 30              # From 50K config (was 80)
    atr_period: 14
    sl_atr_multiplier: 1.5        # From 50K config (was 2.5)
    tp_atr_multiplier: 5.0        # From 50K config (was 4.0)
    news_filter: true

  # ── TERTIARY STRATEGY ─────────────────────────────────────────────────────
  # Mini Medallion: DISABLED — matching 50K config (negative expectancy)
  mini_medallion:
    enabled: false                  # Disabled per 50K audit — straight capital drain
    timeframe: 1m
    score_threshold: 5.0
    cooldown_bars: 30
    risk_atr_multiplier: 1.5
    rr_ratio: 2.0
    weights:
      mean_reversion: 1.2
      momentum_burst: 1.0
      volatility_expansion: 1.2
      order_flow: 1.1
      liquidity_sweep: 1.3
      market_regime: 1.0
      volatility_regime: 0.8

trading_hours:
  # Friday cutoff disabled for 24/7 crypto/weekend trading
  # friday_cutoff_utc: "19:00"

  sessions:
    # ── ASIAN SESSION ─────────────────────────────────────────────────────────
    # Tokyo/Singapore. Gold drifts slowly. Lower volume → HALF lot size.
    # Only Kalman + Mini Medallion — momentum needs more volatility.
    # Times UTC | IST: 07:00-11:30
    - name: asian
      start: "01:30"             # 07:00 IST
      end: "06:00"               # 11:30 IST
      enabled: true
      lot_size_multiplier: 0.5
      strategies: [kalman_regime]

    # ── LONDON OPEN ───────────────────────────────────────────────────────────
    # Highest volatility. All 3 enabled strategies fire.
    # Times UTC | IST: 12:30-15:00
    - name: london_open
      start: "07:00"             # 12:30 IST
      end: "09:30"               # 15:00 IST
      enabled: true
      lot_size_multiplier: 1.0
      strategies: [momentum, kalman_regime, breakout]

    # ── LONDON CONTINUATION / NY PRE-MARKET ───────────────────────────────────
    # London still active, NY traders positioning. Strong momentum continuations.
    # Times UTC | IST: 15:00-17:30
    - name: london_ny_overlap
      start: "09:30"             # 15:00 IST
      end: "12:00"               # 17:30 IST
      enabled: true
      lot_size_multiplier: 1.0
      strategies: [momentum, kalman_regime, breakout]

    # ── NY OPEN / LONDON-NY OVERLAP ───────────────────────────────────────────
    # NY + London both active → highest combined liquidity.
    # Times UTC | IST: 17:30-20:00
    - name: new_york_open
      start: "12:00"             # 17:30 IST
      end: "14:30"               # 20:00 IST
      enabled: true
      lot_size_multiplier: 1.0
      strategies: [momentum, kalman_regime, breakout]

    # ── NY EVENING / LATE SESSION ─────────────────────────────────────────────
    # Post-NYSE. Lower volume. Reduced size, skip momentum (needs vol).
    # Times UTC | IST: 20:00 IST → 02:00 IST
    - name: ny_evening
      start: "14:30"             # 20:00 IST
      end: "20:30"               # 02:00 IST next day
      enabled: true
      lot_size_multiplier: 0.75
      strategies: [kalman_regime]

  news_filter:
    enabled: true               # RESTRICTED: No trades ±5 min around high-impact news
    csv_path: news/2026-04-02_news.csv
    currency: USD
    impacts:
      - high
      - red
    buffer_min: 5               # 5-minute buffer
    timezone: Asia/Kolkata

monitoring:
  log_level: INFO
  state_save_interval_sec: 10
  enable_console_logging: true

  alerts:
    kill_switch: true
    daily_loss_pct: 0.02        # Alert at 2% daily loss

data:
  timeframes:
    - 1m
    - 5m
    - 15m
    - 1h
  history_bars: 1000
  tick_buffer_size: 5000

portfolio:
  reconciliation_interval_sec: 30

file_bridge:
  enabled: true
  # ── MT5 data directory ──────────────────────────────────────────────────────
  #
  # WINDOWS 11 USERS:
  #   Option A (recommended — works with ANY username including spaces):
  #     Comment out BOTH data_dir lines below. The bot will auto-detect the
  #     correct path using Windows' %APPDATA% environment variable.
  #
  #   Option B (manual — only needed if auto-detect fails):
  #     Uncomment the line below and replace <YourWindowsUsername> with yours.
  #     If your username has spaces (e.g. "Shubham Ghodke"), include them as-is:
  #     data_dir: "C:/Users/Shubham Ghodke/AppData/Roaming/MetaQuotes/Terminal/Common/Files"
  #
  # macOS (MT5 under Wine — active by default):
  data_dir: "~/Library/Application Support/net.metaquotes.wine.metatrader5/drive_c/users/user/AppData/Roaming/MetaQuotes/Terminal/Common/Files"
  check_interval_ms: 100

shutdown:
  close_all_positions: true
  save_state: true
