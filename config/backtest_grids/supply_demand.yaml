strategy: supply_demand
file: src/strategies/supply_demand_strategy.py
description: First retest of fresh ATR-sized S/D zone after impulse. Currently disabled live.
notes: |
  Disabled 2026-04-15 — standalone PF 1.07, DD 8.6%, no tunable edge; fold-in to MM also failed.
  This grid exists for re-evaluation. If retune produces PF >= 1.4 + G1-G7 pass, propose
  re-enabling. Otherwise the strategy stays off and we delete the source file in a cleanup pass.

anchor:
  min_impulse_atr_mult: 1.6
  zone_lookback_bars: 4
  zone_max_age_bars: 80
  max_active_zones: 5
  zone_touch_tolerance_atr: 0.5
  min_rejection_ratio: 0.40
  adx_min_threshold: 14
  rsi_overbought: 78
  rsi_oversold: 22
  ema_trend_period: 34
  long_only: false
  cooldown_bars: 4

tier1_entry:
  min_impulse_atr_mult: [1.0, 1.6, 2.0, 2.5]   # 4
  zone_touch_tolerance_atr: [0.3, 0.5, 0.8]    # 3
  min_rejection_ratio: [0.30, 0.40, 0.55, 0.70]  # 4
  adx_min_threshold: [10, 14, 18, 22]          # 4
  # combos = 4*3*4*4 = 192

tier2_risk:
  cooldown_bars: [2, 4, 8, 12]
  zone_max_age_bars: [40, 80, 120]
  zone_lookback_bars: [3, 4, 6]
  # one-dim total = 4 + 3 + 3 = 10

tier3_filters:
  regime_preset: [range_only, trend_range, all]
  long_only: [false, true]
  ema_trend_period: [20, 34, 50, 100]
  session_preset: [current, london_ny, all]
  # combos = 3*2*4*3 = 72 -> sampled to 50

max_combos:
  tier1: 200
  tier2: 20
  tier3: 50
