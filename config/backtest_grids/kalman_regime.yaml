strategy: kalman_regime
file: src/strategies/kalman_regime_strategy.py
description: v2 two-sided trend/range regime-switching Kalman. 15m XAUUSD. Re-tune 2026-06-19.
notes: |
  v2 grid (replaces the stale v3 deep-dip grid — v3 keys like dip_entry_atr are NOT
  read by the live v2 strategy). Baseline live params (entry_threshold 2.0, trend_adx_min
  17, sl3.0/tp4.0, htf_sell on) backtest NEGATIVE over the full 2025-01..2026-06 sample:
  PF 0.68 raw / 0.80 strict+enforce, WR 40-44%, avg win ~= avg loss. The problem is entry
  quality (coin-flip WR with no payoff asymmetry), so tier1 sweeps the entry-selectivity
  knobs that actually drive WR; tier2 sweeps the ATR stops / payoff; tier3 the directional
  + session filters. Run WITHOUT --enforce-risk first (the $1k daily-budget cap rejects
  almost every trade and masks signal quality); validate the winner under --enforce-risk
  at live equity afterward.

anchor:
  entry_threshold: 2.0
  trend_adx_min: 17
  min_signal_strength: 0.5
  min_signal_strength_sell: 0.75
  sl_atr_multiplier: 3.0
  tp_atr_multiplier: 4.0
  cooldown_bars: 2
  htf_sell_filter_enabled: true
  htf_sell_ema_period: 50
  session_filter_enabled: true

tier1_entry:
  trend_adx_min: [17, 22, 26, 30]          # 4 — ADX gate for trend mode (raise selectivity)
  entry_threshold: [2.0, 2.5, 3.0]          # 3 — OU z-score extreme for range mode
  min_signal_strength: [0.5, 0.6, 0.7]      # 3 — overall strength floor
  # combos = 4*3*3 = 36

tier2_risk:
  sl_atr_multiplier: [2.0, 2.5, 3.0, 3.5]   # tighter vs wider stops
  tp_atr_multiplier: [3.0, 4.0, 5.0, 6.0]   # payoff asymmetry (LIVE: floored by risk.kalman_min_tp_rr)
  cooldown_bars: [2, 4, 8]                  # re-entry throttle (curbs chop over-trading)
  # one-dim sweep total = 4 + 4 + 3 = 11 runs

tier3_filters:
  htf_sell_filter_enabled: [true, false]
  min_signal_strength_sell: [0.6, 0.75, 0.9]
  session_filter_enabled: [true, false]
  # combos = 2*3*2 = 12

max_combos:
  tier1: 36
  tier2: 11
  tier3: 12
