strategy: vwap
file: src/strategies/vwap_strategy.py
description: >
  VWAP band touch + MACD crossover entry.
  Stage 1: price touches session-anchored VWAP ±band_std_mult StdDev band (arms gate).
  Stage 2: MACD line (blue) crosses Signal line (orange) while gate is armed and in the
  coherent direction → BUY or SELL at the intersection bar, 1:2 RR.
notes: |
  Strategy rewritten 2026-05-09 to replace RSI/CCI reversion with MACD crossover trigger.
  The two-stage gate (VWAP touch → MACD cross) reduces noise trades substantially.
  Grid focuses on: band width, arm window (how long to wait for crossover), MACD parameters,
  and risk knobs. MACD 12/26/9 is the TradingView default and the empirical starting point.

# ── Anchor config (baseline from config_live_10000.yaml vwap block) ──────────
anchor:
  band_std_mult: 1.5
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  macd_arm_window: 5
  stop_atr_mult: 1.5
  atr_period: 14
  max_hold_minutes: 60

# ── Tier 1: Entry logic ───────────────────────────────────────────────────────
# Sweeps the two most important entry parameters: band width and arm window.
# MACD 12/26/9 held fixed at anchor — cross-signal sweep in tier2.
# Combos: 4 × 5 = 20 (well under 200 cap)
tier1_entry:
  band_std_mult: [1.0, 1.5, 2.0, 2.5]       # 4 — narrower bands fire more often
  macd_arm_window: [3, 4, 5, 7, 10]          # 5 — bars to wait for MACD cross after touch

# ── Tier 2: Risk knobs ────────────────────────────────────────────────────────
# Hold tier1 winner fixed, sweep SL multiplier and time stop.
# Combos: 5 × 4 = 20
tier2_risk:
  stop_atr_mult: [1.0, 1.5, 2.0, 2.5, 3.0]   # 5
  max_hold_minutes: [30, 45, 60, 90]           # 4

# ── Tier 3: Structural filters ────────────────────────────────────────────────
# Hold tier1+tier2 winner, sweep MACD period sensitivity and timeframe.
# Combos: 2 × 3 × 3 = 18
tier3_filters:
  macd_fast: [8, 12, 16]                       # 3 — shorter fast EMA = more sensitive
  macd_slow: [21, 26, 34]                       # 3
  timeframe: [5m, 15m]                          # 2 — 5m for frequency, 15m for quality

max_combos:
  tier1: 200
  tier2: 20
  tier3: 20

# ── Stress days (backtest.md §5.5) ───────────────────────────────────────────
stress_days:
  - "2022-02-24"   # Russia-Ukraine invasion shock (gold spike)
  - "2022-03-08"   # Commodity short squeeze
  - "2022-09-26"   # UK gilt blow-up
  - "2023-03-10"   # SVB collapse → flight-to-gold
  - "2024-08-05"   # Yen carry unwind
  - "2024-11-05"   # US election
