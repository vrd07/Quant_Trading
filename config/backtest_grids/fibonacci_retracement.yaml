strategy: fibonacci_retracement
file: src/strategies/fibonacci_retracement_strategy.py
description: Pullbacks into 50%-61.8% Golden Zone with rejection-candle confirmation.
notes: |
  big_trend tuned (Apr 2026): PF 1.75, WR 36.8%, DD 9.2%, 152 trades / 6mo XAUUSD 5m.
  Critical: min_swing_atr_mult bumped 2.0 -> 3.5 (only BIG swings). Grid must keep 3.5 in range.
  RANGE weight enabled 2026-04-22 (memory note flagged trial, not backtest-justified) —
  tier 3 regime sweep will sanity-check.

anchor:
  swing_lookback: 5
  min_swing_atr_mult: 3.5
  swing_max_age_bars: 100
  golden_zone_upper: 0.618
  golden_zone_lower: 0.50
  min_rejection_ratio: 0.55
  adx_min_threshold: 25
  adx_max_threshold: 70
  ema_trend_period: 50
  atr_stop_multiplier: 1.5
  rr_ratio: 2.5
  cooldown_bars: 10

tier1_entry:
  min_swing_atr_mult: [2.0, 2.5, 3.0, 3.5, 4.0]  # 5
  swing_lookback: [3, 5, 7, 10]                   # 4
  golden_zone_upper: [0.618, 0.65, 0.786]         # 3
  golden_zone_lower: [0.382, 0.50, 0.618]         # 3
  # combos = 5*4*3*3 = 180

tier2_risk:
  atr_stop_multiplier: [1.0, 1.5, 2.0, 2.5]
  rr_ratio: [1.5, 2.0, 2.5, 3.0]
  cooldown_bars: [5, 10, 15]
  # one-dim total = 4 + 4 + 3 = 11

tier3_filters:
  regime_preset: [trend_only, trend_range, all]
  long_only: [false, true]
  session_preset: [current, london_ny, ny, all]
  ema_trend_period: [20, 50, 100, 200]
  # combos = 3*2*4*4 = 96 -> sampled to 50

max_combos:
  tier1: 200
  tier2: 20
  tier3: 50
