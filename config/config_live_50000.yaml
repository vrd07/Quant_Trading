# Live Trading Environment Configuration
# $50,000 Account Size
# Rules: Daily max loss < $300, risk per trade $40, daily profit target $300
# Risk per trade: $40 (0.08%) — 0.04 lot XAUUSD × 100 pip stop = $40
# Target profit:  $100–$120 per trade (RR 2.5–3.0, set at 2.5 = $100)
# News Trading: Restricted (±5 min around high-impact news)
# Overnight & Weekend Holding: Allowed

environment: live

account:
  initial_balance: 50000.0
  currency: USD
  leverage: 100  # Default (FX). Symbol-specific leverage handled below.

symbols:
  XAUUSD:
    enabled: true
    pip_value: 0.01
    min_lot: 0.04             # System minimum
    max_lot: 0.04             # Scaled for 50K — allows larger position management
    lot_step: 0.01
    value_per_lot: 100
    commission_per_lot: 0.0
    leverage: 30              # Metals 1:30
    min_stops_distance: 1.0   # 100 pips min distance for Gold
    max_spread: 3.5           # 35 pips max spread threshold


  BTCUSD:
    enabled: false
    pip_value: 0.1
    min_lot: 0.04
    max_lot: 0.04             # Increased slightly for 50K margin
    lot_step: 0.01
    value_per_lot: 1
    commission_per_lot: 0.0
    leverage: 2               # Crypto 1:2
    min_stops_distance: 5.0   # $5.00 min distance for Bitcoin
    max_spread: 15.0          # $15.00 max spread threshold


  EURUSD:
    enabled: false
    pip_value: 0.00001
    min_lot: 0.01
    max_lot: 0.04
    lot_step: 0.01
    value_per_lot: 100000
    commission_per_lot: 0.0
    leverage: 100             # FX 1:100
    min_stops_distance: 0.00050 # 5 pip min distance
    max_spread: 0.00030       # 3 pips max spread threshold


  US30:
    enabled: false
    pip_value: 1.0
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
    value_per_lot: 1
    commission_per_lot: 0.0
    leverage: 20              # Indices 1:20
    max_spread: 5.0           # 5 points max spread threshold

  USOIL:
    enabled: false
    pip_value: 0.01
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
    value_per_lot: 1000
    commission_per_lot: 0.0
    leverage: 10              # Energies 1:10
    max_spread: 0.05          # 5 cents max spread threshold

risk:
  # $50,000 Account Risk Parameters
  max_drawdown_pct: 0.07          # 7% Max Overall/Trailing Drawdown ($3500)
  max_daily_loss_pct: 0.006       # 0.6% Max Daily Loss ($300)
  bypass_drawdown_limit: false    # DO NOT bypass — prop firm measures trailing drawdown from peak equity

  # $40 risk per trade = 0.08% of $50,000
  # Basis: 0.04 lot XAUUSD × 100 pip stop × $10/pip/lot = $40
  risk_per_trade_pct: 0.0008      # 0.08% = $40 per trade

  # ABSOLUTE DOLLAR LOSS/PROFIT LIMITS
  absolute_max_loss_usd: 295      # Daily loss limit — hard cap below $300
  max_drawdown_usd: 3500          # Overall drawdown limit ($50k × 7%)
  max_daily_profit_usd: 300       # Stop trading for the day once $300 profit hit

  max_positions: 2
  max_daily_trades: 50
  max_exposure_per_symbol_pct: 5.0
  max_daily_wins: 8               # Stop trading once 8 wins hit

  position_sizing:
    method: fixed                 # GFT account — fixed lot, no martingale/dynamic scaling
    fixed_lots:
      XAUUSD: 0.04                # 0.04 lot × ~100 pip stop × $10/pip = ~$40 risk
      EURUSD: 0.01                # 0.01 lot — conservative fixed size for FX
      default: 0.01               # Fallback for any other symbol
  circuit_breaker:
    enabled: true
    max_consecutive_losses: 5      # Kill switch (hard stop)
    cooldown_minutes: 15
    loss_pause_consecutive: 3      # Soft pause after 3 consecutive losses
    loss_pause_minutes: 15         # Pause for 15 minutes then resume

  trailing_stop:
    enabled: true
    breakeven_atr_mult: 0.5        # Move SL to breakeven at +0.5× risk distance
    lock_atr_mult: 1.5             # Move SL to partial lock at +1.5× risk distance
    lock_fraction: 0.5             # Lock in 50% of original risk at stage 2
    time_stop_minutes: 45          # Close position if open for more than 45 minutes
    ml_exhaustion_factor: 0.8      # (ML ONLY) If exhaustion pipeline generates predicted pips, tight_lock 80% of it immediately when reached

  # Session windows: only trade London open (7-9am) and NY open (12-2pm UTC)
  # (enforced by trading_hours sessions below)

strategies:
  signal_cooldown_minutes: 5
  primary_timeframe: 1m
  min_bars_required: 5              # Reduced from 10 so 5m strategies activate faster

  regime_filter:
    enabled: true
    adx_period: 14
    adx_trend_threshold: 25
    adx_range_threshold: 20
    atr_period: 14
    atr_ma_period: 20
    use_hurst: true
    hurst_period: 100
    hurst_trend_threshold: 0.55
    hurst_range_threshold: 0.45

  breakout:
    enabled: true
    timeframe: 5m                 # 5m candles — less noise than 1m
    donchian_period: 20
    confirmation_bars: 1
    rr_ratio: 2.5             # $40 risk × 2.5 = $100 target
    only_in_regime: TREND
    mtf_confirmation: true
    atr_stop_multiplier: 1.5  # Targets ~45 pip stop on XAUUSD 1m
    adx_min_threshold: 25
    volume_confirmation: true
    volume_ratio_min: 1.35        # Raised from 1.2 — aggressive flow detection (arXiv:2405.08101)
    rsi_overbought: 75
    rsi_oversold: 25
    bb_squeeze_lookback: 10       # Reduced from 20 → min_bars = 35 (was 45, was blocking with 44 bars!)
    stoch_overbought: 80
    stoch_oversold: 20
    min_signal_strength: 0.65
    min_body_atr_ratio: 0.45      # Raised from 0.35 — quality breakout bar filter (arXiv:2602.18912)
    min_breakout_atr_dist: 0.15   # Minimum close distance beyond channel in ATR units
    atr_spike_mult: 1.5           # Suppress entries when ATR > 1.5× 20-bar mean (fear regime)
    atr_ma_period: 20

  mean_reversion:
    enabled: true                # ML-gated: regime_classifier enables only when RANGE regime detected
    zscore_lookback: 20
    entry_threshold: 2.0
    exit_threshold: 0.5
    stop_threshold: 3.0
    rr_ratio: 2.5             # $40 risk × 2.5 = $100 target
    only_in_regime: RANGE
    mtf_confirmation: false

  vwap:
    enabled: true
    timeframe: 1m
    # StdDev bands (research: Chaudhary 2024, Zarattini & Aziz SSRN 4631351)
    # 2.0σ for XAUUSD (higher vol instrument); 1.5σ for EURUSD
    band_std_mult: 2.0
    partial_std_mult: 0.5         # TP at 0.5σ convergence — not waiting for full VWAP tag
    stop_atr_multiplier: 1.5
    atr_period: 14
    min_volume_ratio: 1.0
    rsi_oversold_entry: 35
    rsi_overbought_entry: 65
    cci_oversold_entry: -100
    cci_overbought_entry: 100
    cci_period: 20
    only_in_regime: RANGE
    max_hold_minutes: 45          # Reversion thesis expires — exit unconditionally

  momentum:
    enabled: true
    timeframe: 5m                 # 5m candles — avoids 1m noise in EMA stack
    rsi_period: 14
    ema_period: 20
    rr_ratio: 2.5             # $40 risk × 2.5 = $100 target
    atr_stop_multiplier: 1.5  # Targets ~45 pip stop on XAUUSD 1m
    rsi_bull_threshold: 50
    rsi_bear_threshold: 50
    rsi_overbought: 80
    rsi_oversold: 20
    adx_min_threshold: 25
    volume_confirmation: true
    volume_ratio_min: 1.0
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    ema_fast: 9
    ema_mid: 21
    ema_slow: 50                  # Restored to institutional standard — EMA9>EMA21>EMA50 full trend alignment
    rsi_slope_bars: 3
    min_signal_strength: 0.70
    only_in_regime: TREND
    atr_spike_mult: 1.5           # Suppress entries when ATR > 1.5× 20-bar mean (arXiv:2602.18912)
    atr_ma_period: 20

  kalman_regime:
    enabled: true
    timeframe: 15m                # 15m candles — smoother Kalman trend detection
    kalman_q: 0.00001
    kalman_r: 0.01
    rv_window: 20
    rv_ma_window: 100
    zscore_window: 20
    entry_threshold: 2.5          # Increased to 2.5 for highly confirmed trend deviations
    trend_adx_min: 25
    kalman_confirm_bars: 2
    min_signal_strength: 0.75
    atr_period: 14
    sl_atr_multiplier: 1.5    # Targets ~45 pip stop on XAUUSD 1m
    tp_atr_multiplier: 5.0    # $40 risk × 2.5x via ATR-distance
    news_filter: true

  mini_medallion:
    enabled: true
    timeframe: 1m
    score_threshold: 4.0
    risk_atr_multiplier: 1.0  # Stop loss at 1x ATR based on instruction specs
    rr_ratio: 1.5             # Take profit at 1.5x ATR
    weights:
      mean_reversion: 1.0
      momentum_burst: 0.8
      volatility_expansion: 1.2
      vwap_reversion: 0.9
      order_flow: 1.1
      liquidity_sweep: 1.3
      lead_lag: 0.7
      market_regime: 1.0
      session_volatility: 0.6
      volatility_spike: 0.8

trading_hours:
  # Friday cutoff disabled for 24/7 crypto/weekend trading
  # friday_cutoff_utc: "19:00"

  sessions:
    # ── ASIAN SESSION ─────────────────────────────────────────────────────────
    # Tokyo/Singapore. Gold drifts slowly. Lower volume → use HALF lot size.
    # ML=TREND  → breakout + kalman fire on directional drifts
    # ML=RANGE  → vwap + kalman trade mean-reversion quietly
    # Times UTC | IST: 07:00-11:30
    - name: asian
      start: "01:30"             # 07:00 IST
      end: "06:00"               # 11:30 IST
      enabled: true
      lot_size_multiplier: 0.5   # ← HALF size in thin Asian market (0.01 lots)
      strategies: [breakout, kalman_regime, vwap, mini_medallion]

    # ── LONDON OPEN ───────────────────────────────────────────────────────────
    # 🔥 Highest volatility. Biggest directional breakouts of the day.
    # ICT Kill Zone: institutional flow drives strong trends here — VWAP mean
    # reversion has no edge. Only trend-following strategies.
    # Times UTC | IST: 12:30-15:00
    - name: london_open
      start: "07:00"             # 12:30 IST
      end: "09:30"               # 15:00 IST
      enabled: true
      lot_size_multiplier: 1.0   # Full size
      strategies: [breakout, momentum, kalman_regime, mini_medallion]

    # ── LONDON CONTINUATION / NY PRE-MARKET ───────────────────────────────────
    # London still active, NY traders positioning before open.
    # Strong momentum continuations + VWAP reversion from London spike.
    # Times UTC | IST: 15:00-17:30
    - name: london_ny_overlap
      start: "09:30"             # 15:00 IST
      end: "12:00"               # 17:30 IST
      enabled: true
      lot_size_multiplier: 1.0   # Full size — still high liquidity
      strategies: [breakout, momentum, kalman_regime, vwap, mini_medallion]

    # ── NY OPEN / LONDON-NY OVERLAP ───────────────────────────────────────────
    # 🔥 NY session opens. London + NY both active → highest combined liquidity.
    # ICT Kill Zone: institutional order flow drives momentum here — VWAP mean
    # reversion has no edge. Only trend-following strategies.
    # Times UTC | IST: 17:30-20:00
    - name: new_york_open
      start: "12:00"             # 17:30 IST
      end: "14:30"               # 20:00 IST
      enabled: true
      lot_size_multiplier: 1.0   # Full size
      strategies: [breakout, momentum, kalman_regime, mini_medallion]

    # ── NY EVENING / LATE SESSION ─────────────────────────────────────────────
    # Post-NYSE. Lower volume. Clean trends when ML=TREND, noisy otherwise.
    # NOTE: ML override auto-disables breakout/momentum on RANGE days.
    # Times UTC | IST: 20:00 IST → 02:00 IST
    - name: ny_evening
      start: "14:30"             # 20:00 IST
      end: "20:30"               # 02:00 IST next day
      enabled: true
      lot_size_multiplier: 0.75  # Slightly reduced — thinner market
      strategies: [breakout, momentum, kalman_regime, mini_medallion]

  news_filter:
    enabled: true               # RESTRICTED: No trades ±5 min around high-impact news
    csv_path: news/MAR_news.csv
    currency: USD
    impacts:
      - high
      - red
    buffer_min: 5               # 5-minute buffer
    timezone: Asia/Kolkata

monitoring:
  log_level: INFO
  state_save_interval_sec: 10
  enable_console_logging: true

  alerts:
    kill_switch: true
    daily_loss_pct: 0.005       # Alert at 0.5% daily loss ($250)

data:
  timeframes:
    - 1m
    - 5m
    - 15m
    - 1h
  history_bars: 1000
  tick_buffer_size: 5000

portfolio:
  reconciliation_interval_sec: 30

file_bridge:
  enabled: true
  # ── MT5 data directory ──────────────────────────────────────────────────────
  #
  # WINDOWS 11 USERS:
  #   Option A (recommended — works with ANY username including spaces):
  #     Comment out BOTH data_dir lines below. The bot will auto-detect the
  #     correct path using Windows' %APPDATA% environment variable.
  #
  #   Option B (manual — only needed if auto-detect fails):
  #     Uncomment the line below and replace <YourWindowsUsername> with yours.
  #     If your username has spaces (e.g. "Shubham Ghodke"), include them as-is:
  #     data_dir: "C:/Users/Shubham Ghodke/AppData/Roaming/MetaQuotes/Terminal/Common/Files"
  #
  # macOS (MT5 under Wine — active by default):
  data_dir: "~/Library/Application Support/net.metaquotes.wine.metatrader5/drive_c/users/user/AppData/Roaming/MetaQuotes/Terminal/Common/Files"
  check_interval_ms: 100

shutdown:
  close_all_positions: true
  save_state: true
