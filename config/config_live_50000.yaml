# Live Trading Environment Configuration — Goat Funded Trader
# $50,000 Account Size
# Rules: Daily max loss < $300, risk per trade $40, daily profit target $300
# Risk per trade: $40 (0.08%) — 0.04 lot XAUUSD × 100 pip stop = $40
# Target profit:  $100–$120 per trade (RR 2.5–3.0, set at 2.5 = $100)
# News Trading: Restricted (±5 min around high-impact news)
# Overnight & Weekend Holding: Allowed
#
# Active strategies (backtested on XAUUSD 5m Jan 2025 → Mar 2026):
#   Momentum:       +4.9%, PF 1.10, DD 4.85% — primary
#   Kalman Regime:  +10.1%, PF 1.08, DD 7.4% — secondary (30-bar cooldown)
#   Mini Medallion: +0.82%, PF 1.03, DD 2.9% — diversifier

environment: live

account:
  initial_balance: 50000.0
  currency: USD
  leverage: 100  # Default (FX). Symbol-specific leverage handled below.

symbols:
  XAUUSD:
    enabled: true
    pip_value: 0.01
    min_lot: 0.04             # System minimum
    max_lot: 0.12             # v2: scaled up for $300/day target — 3x base position
    lot_step: 0.01
    value_per_lot: 100
    commission_per_lot: 0.0
    leverage: 30              # Metals 1:30
    min_stops_distance: 1.0   # 100 pips min distance for Gold
    max_spread: 3.5           # 35 pips max spread threshold


  BTCUSD:
    enabled: false
    pip_value: 0.1
    min_lot: 0.04
    max_lot: 0.04             # Increased slightly for 50K margin
    lot_step: 0.01
    value_per_lot: 1
    commission_per_lot: 0.0
    leverage: 2               # Crypto 1:2
    min_stops_distance: 5.0   # $5.00 min distance for Bitcoin
    max_spread: 15.0          # $15.00 max spread threshold


  EURUSD:
    enabled: false
    pip_value: 0.00001
    min_lot: 0.01
    max_lot: 0.04
    lot_step: 0.01
    value_per_lot: 100000
    commission_per_lot: 0.0
    leverage: 100             # FX 1:100
    min_stops_distance: 0.00050 # 5 pip min distance
    max_spread: 0.00030       # 3 pips max spread threshold


  US30:
    enabled: false
    pip_value: 1.0
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
    value_per_lot: 1
    commission_per_lot: 0.0
    leverage: 20              # Indices 1:20
    max_spread: 5.0           # 5 points max spread threshold

  USOIL:
    enabled: false
    pip_value: 0.01
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
    value_per_lot: 1000
    commission_per_lot: 0.0
    leverage: 10              # Energies 1:10
    max_spread: 0.05          # 5 cents max spread threshold

risk:
  # $50,000 Account Risk Parameters
  max_drawdown_pct: 0.07          # 7% Max Overall/Trailing Drawdown ($3500)
  max_daily_loss_pct: 0.006       # 0.6% Max Daily Loss ($300)
  bypass_drawdown_limit: false    # DO NOT bypass — prop firm measures trailing drawdown from peak equity

  # $40 risk per trade = 0.08% of $50,000
  # Basis: 0.04 lot XAUUSD × 100 pip stop × $10/pip/lot = $40
  risk_per_trade_pct: 0.0024      # v2: 0.24% = ~$120 per trade (3x for $300/day target)

  # ABSOLUTE DOLLAR LOSS/PROFIT LIMITS
  absolute_max_loss_usd: 295      # Daily loss limit — hard cap below $300
  max_drawdown_usd: 3500          # Overall drawdown limit ($50k × 7%)
  max_daily_profit_usd: 300       # Stop trading for the day once $300 profit hit
  daily_loss_budget_safety_pct: 0.85  # Pre-trade budget gate: reject if worst-case SL hit
                                      # would push daily loss past 85% of $295 = $250.75
                                      # Gives $44 buffer for slippage / concurrent fills

  max_positions: 2
  max_daily_trades: 15                # Reduced from 50 — audit: 21 trades/day × $350 daily StdDev ≫ $295 limit
  max_exposure_per_symbol_pct: 5.0
  max_daily_wins: 8               # Stop trading once 8 wins hit

  position_sizing:
    method: fixed                 # GFT account — fixed lot, no martingale/dynamic scaling
    fixed_lots:
      XAUUSD: 0.20                # v3: 0.20 lot × ~100 pip stop × $10/pip = ~$200 risk (targets $500/day)
      EURUSD: 0.01                # 0.01 lot — conservative fixed size for FX
      default: 0.01               # Fallback for any other symbol
  circuit_breaker:
    enabled: true
    max_consecutive_losses: 3      # Tightened from 5 — audit: max 16 consecutive losses seen
    cooldown_minutes: 30           # Doubled from 15 — let volatility subside before re-entering
    loss_pause_consecutive: 2      # Tightened from 3 — pause earlier to preserve daily loss budget
    loss_pause_minutes: 30         # Doubled from 15 — match cooldown duration

  trailing_stop:
    enabled: true
    breakeven_atr_mult: 1.2        # Move SL to breakeven at +1.2× risk distance (was 0.5 — too tight, normal noise stopped out trades)
    lock_atr_mult: 2.0             # Move SL to partial lock at +2.0× risk distance (was 1.5)
    lock_fraction: 0.5             # Lock in 50% of original risk at stage 2
    # time_stop_minutes removed — was 45 min, killed 30-59% of trades before TP could be reached
    ml_exhaustion_factor: 0.8      # (ML ONLY) If exhaustion pipeline generates predicted pips, tight_lock 80% of it immediately when reached


  # Session windows: only trade London open (7-9am) and NY open (12-2pm UTC)
  # (enforced by trading_hours sessions below)

strategies:
  signal_cooldown_minutes: 5
  primary_timeframe: 1m
  min_bars_required: 5              # Reduced from 10 so 5m strategies activate faster

  regime_filter:
    enabled: true
    adx_period: 14
    adx_trend_threshold: 25
    adx_range_threshold: 20
    atr_period: 14
    atr_ma_period: 20
    use_hurst: true
    hurst_period: 100
    hurst_trend_threshold: 0.55
    hurst_range_threshold: 0.45

  breakout:
    enabled: true
    timeframe: 5m
    donchian_period: 12             # v3: shorter channel (60 min) — faster breakout detection
    rr_ratio: 3.0                   # v3: wider TP — gold trends well, capture more per winner
    only_in_regime: TREND
    atr_stop_multiplier: 2.0        # v3: back to 2.0 — 1.5 was too tight, stops hit too early
    adx_min_threshold: 20           # v3: back to 20 — quality over quantity
    min_body_atr_ratio: 0.30        # v3: back to 0.30 — ensures quality breakout bars
    volume_confirmation: false
    rsi_overbought: 78              # v3: widened from 75 — let strong trends run
    rsi_oversold: 22                # v3: widened from 25
    atr_spike_mult: 1.8             # v3: relaxed from 1.5 — gold is volatile, allow more
    cooldown_bars: 2                # v3: reduced from 4 — more trade frequency
    # v3 filters: data-driven from 353-trade backtest analysis
    bb_squeeze_enabled: true        # Only breakout after consolidation
    bb_squeeze_period: 20
    bb_squeeze_percentile: 70       # v3: relaxed from 60 — less restrictive entry
    bb_squeeze_lookback: 50
    htf_trend_enabled: true         # 1H EMA(21) trend must align with breakout direction
    htf_ema_period: 21
    session_filter_enabled: true    # Only trade during high-WR sessions
    allowed_sessions: [[4,4],[7,8],[22,22]]  # v3: ONLY profitable hours — London pre (4), prime (7-8), late NY (22)
    close_position_pct: 0.35        # v3: relaxed from 0.30 — fewer false rejections
    macd_confirmation: true         # MACD histogram must confirm direction
    ema_confirm_enabled: true       # v3: EMA fast/slow crossover alignment — improved WR to 33.5%
    ema_fast_period: 9
    ema_slow_period: 21

  mean_reversion:
    enabled: false              # -1.63%, PF 0.40, 15% WR — no edge on gold
    zscore_lookback: 20
    entry_threshold: 2.0
    exit_threshold: 0.5
    stop_threshold: 3.0
    rr_ratio: 2.5
    only_in_regime: RANGE
    mtf_confirmation: false

  vwap:
    enabled: true               # v4: enabled as low-freq diversifier — PF 1.85, 50% WR (6mo)
    timeframe: 5m
    band_std_mult: 1.0          # v4: 2σ rarely touched on 5m gold → 1σ
    partial_std_mult: 0.3
    stop_atr_multiplier: 1.8
    atr_period: 14
    min_volume_ratio: 0.0
    rsi_oversold_entry: 45
    rsi_overbought_entry: 55
    cci_oversold_entry: -60
    cci_overbought_entry: 60
    cci_period: 20
    only_in_regime: RANGE
    allowed_hours: [2, 11, 15, 19]   # v4: data-driven net-positive UTC hours


  # ── PRIMARY STRATEGY ──────────────────────────────────────────────────────
  # Momentum v3: Session-filtered, wider SL, optimized for $500/day target
  # Data-driven: profitable hours [1,3,4,5,7,8,10,16,17,22], losers [12,14,15,18,19] cut
  # Wider SL (2.0 ATR) reduces false stop-outs (was 75% SL hit rate)
  # Lower RR (2.0) improves TP hit rate; larger lots (0.20) scale dollar returns
  momentum:
    enabled: true
    timeframe: 5m
    rsi_period: 14
    ema_period: 20
    rr_ratio: 2.0             # v3: lowered from 2.5 — improves TP hit rate
    atr_stop_multiplier: 2.0  # v3: widened from 1.5 — reduces false SL hits (was 75% SL rate)
    rsi_bull_threshold: 53       # v3: slightly tighter — higher conviction entries
    rsi_bear_threshold: 47       # v3: slightly tighter
    rsi_overbought: 78
    rsi_oversold: 22
    adx_min_threshold: 22       # v3: raised from 20 — stronger trend confirmation
    volume_confirmation: false
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    ema_fast: 9
    ema_mid: 21
    ema_slow: 30
    rsi_slope_bars: 3
    min_signal_strength: 0.60   # v3: raised from 0.50 — quality over quantity
    min_signal_strength_sell: 0.65  # v3: raised from 0.60
    only_in_regime: TREND
    # v3: session filter — only trade data-proven profitable hours
    session_filter_enabled: true
    allowed_hours: [1, 3, 4, 5, 7, 8, 10, 16, 17, 22]

  # ── SECONDARY STRATEGY ────────────────────────────────────────────────────
  # Kalman v2: pure Kalman + session filter on 15m — data-driven optimization
  # v1 best hours: 20 (39% WR, $19/trade), 21 (32% WR, $36/trade), 4 (32%, $7), 3-6 profitable
  # EMA/MACD filters HURT WR in best hours — removed. Session filter + Kalman purity wins.
  kalman_regime:
    enabled: true
    timeframe: 15m
    long_only: true                 # SELL side lost -$3,106 even with MACD filters. Long-only.
    kalman_q: 0.00001
    kalman_r: 0.01
    rv_window: 20
    rv_ma_window: 100
    zscore_window: 20
    entry_threshold: 2.0            # v2: lowered from 2.5 — more range entries
    trend_adx_min: 20               # v2: lowered from 22
    kalman_confirm_bars: 2          # Keep 2-bar confirmation (proven in v1)
    min_signal_strength: 0.50
    cooldown_bars: 2                # v2: 30 min cooldown (was 30 bars = 7.5hr!)
    atr_period: 14
    sl_atr_multiplier: 1.5
    tp_atr_multiplier: 8.0          # v2: 8x ATR TP — let big trends run ($128 per winner)
    news_filter: true
    # v2: session filter only — EMA/MACD disabled (hurt WR in best hours)
    session_filter_enabled: true
    allowed_sessions: [[1,1],[3,6],[15,15],[20,21]]  # v1 profitable hours — hour 2 removed (net loser)
    ema_confirm_enabled: false
    macd_confirmation: false
    kalman_accel_enabled: false
    stoch_confirm_enabled: false
    range_rsi_buy: 42
    range_rsi_sell: 58

  # ── TERTIARY STRATEGY ─────────────────────────────────────────────────────
  # Mini Medallion v2: Optimized from backtest analysis
  # v1 audit: -$5,449, PF 0.84, 26.9% WR — SELL side lost -$8.3K, BUY made +$3.1K
  # v2 changes: long-only, session filter (profitable hours only), lower threshold,
  #   higher RR, ADX filter, rebalanced weights
  mini_medallion:
    enabled: true                   # v5: backtest-validated tuning — 51% WR, PF 1.31, 6.9% annualized
    timeframe: 5m
    score_threshold: 3.5            # v5: stronger conviction gate
    cooldown_bars: 10
    risk_atr_multiplier: 2.2        # v5: widened SL — tight stops were noise-tagged (77% SL rate)
    rr_ratio: 1.2                   # v5: realistic TP on 5m (was 3.0 → never filled)
    long_only: true                 # Gold upward bias
    session_filter_enabled: true
    allowed_hours: [5, 7, 8]        # v5: per-hour backtest — only these 3 hours are net-positive
    adx_min_threshold: 22
    min_signal_strength: 0.0        # v5: strength had no predictive power
    weights:
      mean_reversion: 1.0
      momentum_burst: 1.2
      volatility_expansion: 1.3
      order_flow: 1.1
      liquidity_sweep: 1.5
      market_regime: 1.2
      volatility_regime: 0.6


  # ── STRUCTURE BREAK + RETEST (SBR) ─────────────────────────────────
  # Trades confirmed retests of broken Donchian channel structure.
  # Unlike donchian_breakout (trades initial break), SBR waits for
  # the higher-probability retest confirmation phase.
  # Backtest (50K, Jan 2025–Mar 2026): +0.79%, PF 1.03, DD 4.07%, 708 trades
  sbr:
    enabled: true
    timeframe: 5m
    lookback_period: 20           # Donchian channel period for structure detection
    retest_tolerance_atr: 0.4     # Tighter retest zone (was 0.5)
    min_rejection_ratio: 0.55     # Slightly relaxed to catch more valid retests
    retest_window_bars: 20        # Tighter window (was 30) — stale breaks fail
    adx_min_threshold: 22         # Slightly higher ADX floor
    adx_max_threshold: 55         # Cap ADX — overheated trends whipsaw
    rsi_overbought: 70            # Tighter RSI bands
    rsi_oversold: 30
    atr_stop_multiplier: 1.2      # Tighter SL (was 1.5) — broken level is strong invalidation
    rr_ratio: 2.0                 # Lowered from 2.5 — improves TP hit rate
    cooldown_bars: 8              # Fast re-entry in quality sessions
    long_only: false
    only_in_regime: TREND
    # v2 filters
    ema_trend_period: 50          # 50-EMA trend alignment required
    min_strength: 0.65            # Moderate strength gate
    session_hours: [5, 6, 7, 13, 16, 17, 22]  # High-WR hours: London open, NY afternoon, late session

  # ── SUPPLY & DEMAND ZONE STRATEGY ─────────────────────────────────────────
  # Trades confirmed retests of algorithmically-detected S&D zones.
  # Zone = consolidation base immediately before a strong impulse move (>= 2.5× ATR body).
  # Entry fires when price returns to the base zone with a rejection candle.
  #
  # Disabled by default — backtest on XAUUSD 5m before enabling live.
  # To backtest: python scripts/run_backtest.py --strategy supply_demand
  supply_demand:
    enabled: false              # Backtest 2yr: PF 1.07, DD -8.56%, 34.7% WR — no tunable edge on XAUUSD. Fold-in to mini_medallion also hurt composite.
    timeframe: 5m
    # Zone formation — loosened to surface more setups on 5m XAUUSD
    min_impulse_atr_mult: 1.6   # Was 2.5 — 1.6× ATR body is still a decisive move
    zone_lookback_bars: 4       # Tighter base → cleaner retests
    zone_max_age_bars: 80       # Freshness matters; stale zones lose edge
    max_active_zones: 5         # More zones in memory = more retest chances
    # Entry confirmation — relaxed but still quality-gated
    zone_touch_tolerance_atr: 0.5   # Wider touch tolerance (was 0.3)
    min_rejection_ratio: 0.40       # Was 0.55 — 40% wick still a credible rejection
    adx_min_threshold: 14           # Was 18
    rsi_overbought: 78
    rsi_oversold: 22
    ema_trend_period: 34            # Faster trend filter (was 50)
    long_only: false
    session_hours: [4, 5, 6, 7, 8, 9, 12, 13, 14, 15, 16, 17, 18, 19, 22]  # London + full NY
    cooldown_bars: 4                # Was 10 — allow faster re-entry

  # ── ASIA RANGE FADE ───────────────────────────────────────────────────────
  # Fills UTC 09–13 (14:30–18:30 IST) dead window. Backtest 2025-01→2026-03:
  # 214 trades, WR 45.3%, PF 1.31, DD 1.6%, expectancy $1.31/trade on $10k.
  asia_range_fade:
    enabled: true
    timeframe: 5m
    session_hours: [9, 10, 11, 12, 13]
    lookback_bars: 20
    adx_max: 28.0
    bb_period: 20
    bb_width_window: 200
    bb_width_percentile: 0.60
    rsi_period: 14
    rsi_oversold: 35.0
    rsi_overbought: 65.0
    atr_period: 14
    atr_stop_multiplier: 1.5
    rr_ratio: 1.5
    cooldown_bars: 12
    long_only: false
    respect_ml_trend: true


trading_hours:
  # Friday cutoff disabled for 24/7 crypto/weekend trading
  # friday_cutoff_utc: "19:00"

  sessions:
    # ── 24/7 ALL STRATEGIES ───────────────────────────────────────────────────
    # Single session covering the full day. All enabled strategies fire at all times.
    - name: all_day
      start: "00:00"
      end: "23:59"
      enabled: true
      lot_size_multiplier: 1.0
      strategies: [momentum, kalman_regime, breakout, sbr, mini_medallion, vwap, supply_demand, asia_range_fade]

  news_filter:
    enabled: true               # RESTRICTED: No trades ±5 min around high-impact news
    csv_path: news/2026-04-15_news.csv
    currency: USD
    impacts:
      - high
      - red
    buffer_min: 5               # 5-minute buffer
    timezone: Asia/Kolkata

monitoring:
  log_level: INFO
  state_save_interval_sec: 10
  enable_console_logging: true

  alerts:
    kill_switch: true
    daily_loss_pct: 0.005       # Alert at 0.5% daily loss ($250)

data:
  timeframes:
    - 1m
    - 5m
    - 15m
    - 1h
  history_bars: 1000
  tick_buffer_size: 5000

portfolio:
  reconciliation_interval_sec: 30

file_bridge:
  enabled: true
  # ── MT5 data directory ──────────────────────────────────────────────────────
  #
  # WINDOWS 11 USERS:
  #   Option A (recommended — works with ANY username including spaces):
  #     Comment out BOTH data_dir lines below. The bot will auto-detect the
  #     correct path using Windows' %APPDATA% environment variable.
  #
  #   Option B (manual — only needed if auto-detect fails):
  #     Uncomment the line below and replace <YourWindowsUsername> with yours.
  #     If your username has spaces (e.g. "Shubham Ghodke"), include them as-is:
  #     data_dir: "C:/Users/Shubham Ghodke/AppData/Roaming/MetaQuotes/Terminal/Common/Files"
  #
  # macOS (MT5 under Wine — active by default):
  data_dir: "~/Library/Application Support/net.metaquotes.wine.metatrader5/drive_c/users/user/AppData/Roaming/MetaQuotes/Terminal/Common/Files"
  check_interval_ms: 100

shutdown:
  close_all_positions: true
  save_state: true
