# Live Trading Environment Configuration
# $5K Account Size - The5ers Challenge
# Rules: 5% daily loss ($250), 10% max trailing drawdown ($500), 8% profit target ($400)

environment: live

account:
  initial_balance: 200.0
  currency: USD
  leverage: 100

symbols:
  XAUUSD:
    enabled: true
    pip_value: 0.01
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
    value_per_lot: 100
    commission_per_lot: 0.0
  
  BTCUSD:
    enabled: false
    pip_value: 0.1
    min_lot: 0.01
    max_lot: 2.0
    lot_step: 0.01
    value_per_lot: 1
    commission_per_lot: 0.0

risk:
  # STRICT LIVE RISK LIMITS
  # 5% Max Drawdown ($250)
  max_drawdown_pct: 0.10            # 10% Max Trailing Loss (The5ers)
  max_daily_loss_pct: 0.05          # 5% Max Daily Loss (The5ers)
  
  # 0.2% risk per trade ($10 on $5k)
  risk_per_trade_pct: 0.002         # $10 risk per trade
  
  # ABSOLUTE DOLLAR LOSS/PROFIT LIMITS
  absolute_max_loss_usd: 250        # Daily loss limit
  max_daily_profit_usd: 135         # $133.33/day to hit $400 in 3 days
  
  max_positions: 2                  # Restrict to two trades at a time
  max_daily_trades: 50
  max_exposure_per_symbol_pct: 5.0    # 500% - needed for small accounts on high-priced instruments (0.01 BTCUSD = ~$66k notional vs $154 equity)
  
  position_sizing:
    method: fixed_fractional
  
  circuit_breaker:
    enabled: true
    max_consecutive_losses: 5       # Was 3 → more runway
    cooldown_minutes: 15            # Was 60 → faster recovery

strategies:
  signal_cooldown_minutes: 5   # 5min for prop challenge (was 10m)
  primary_timeframe: 1m  # Keeping 1m as per user's success
  min_bars_required: 10  # Slightly more data for live stability
  
  regime_filter:
    enabled: true
    adx_period: 14       # Normalized for live
    adx_trend_threshold: 25
    adx_range_threshold: 20
    atr_period: 14
    atr_ma_period: 20
    use_hurst: true
    hurst_period: 100
    hurst_trend_threshold: 0.55
    hurst_range_threshold: 0.45
  
  breakout:
    enabled: true
    donchian_period: 20
    confirmation_bars: 1
    rr_ratio: 1.5
    only_in_regime: TREND
    mtf_confirmation: true
    atr_stop_multiplier: 2.5
    adx_min_threshold: 25            # Raised from 20 — requires stronger trend
    volume_confirmation: true         # NOW ENABLED: EA exports tick volume
    volume_ratio_min: 1.2
    rsi_overbought: 75
    rsi_oversold: 25
    bb_squeeze_lookback: 20           # Require BB squeeze before breakout
    stoch_overbought: 80              # Don't buy when Stochastic already overbought
    stoch_oversold: 20                # Don't sell when Stochastic already oversold
    min_signal_strength: 0.65         # Gate: skip weak signals
  
  mean_reversion:
    enabled: true
    zscore_lookback: 20
    entry_threshold: 2.0
    exit_threshold: 0.5
    stop_threshold: 3.0
    rr_ratio: 2.0
    only_in_regime: RANGE
    mtf_confirmation: false
  
  # VWAP Deviation Strategy 
  vwap:
    enabled: true
    atr_multiplier: 1.5
    stop_atr_multiplier: 2.0
    atr_period: 14
    min_volume_ratio: 1.0
    rsi_oversold_entry: 35      # BUY only when RSI < 35 (genuinely oversold)
    rsi_overbought_entry: 65    # SELL only when RSI > 65 (genuinely overbought)
    cci_oversold_entry: -100    # BUY only when CCI < -100
    cci_overbought_entry: 100   # SELL only when CCI > +100
    cci_period: 20
    only_in_regime: RANGE
  
  # Momentum Scalping Strategy 
  momentum:
    enabled: true
    rsi_period: 14
    ema_period: 20
    rr_ratio: 1.5
    atr_stop_multiplier: 2.0
    rsi_bull_threshold: 50
    rsi_bear_threshold: 50
    rsi_overbought: 75
    rsi_oversold: 25
    adx_min_threshold: 25             # Require ADX >= 25 for strong trend
    volume_confirmation: true         # NOW ENABLED: EA exports tick volume
    volume_ratio_min: 1.0
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    ema_fast: 9                       # EMA triple stack alignment
    ema_mid: 21
    ema_slow: 50
    rsi_slope_bars: 3                 # RSI must be rising/falling over 3 bars
    min_signal_strength: 0.65         # Gate: skip weak signals
    only_in_regime: TREND
  
  # Kalman Regime-Switching Strategy (Instruct.md)
  kalman_regime:
    enabled: true
    kalman_q: 0.00001
    kalman_r: 0.01
    rv_window: 20
    rv_ma_window: 100
    zscore_window: 20
    entry_threshold: 2.5        # Tightened from 2.0 — fewer but cleaner reversals
    trend_adx_min: 22           # Raised from 15 — avoid choppy markets
    kalman_confirm_bars: 2      # Require 2 consecutive bars on correct Kalman side
    min_signal_strength: 0.50   # Gate: skip weak kalman signals
    atr_period: 14
    sl_atr_multiplier: 2.5
    tp_atr_multiplier: 2.0
    news_filter: true

trading_hours:
  sessions:
    - name: london
      start: "07:00"
      end: "16:00"
      enabled: true
    - name: new_york
      start: "12:00"
      end: "21:00"
      enabled: true
  
  news_filter:
    enabled: true  # ALWAYS ON FOR LIVE
    csv_path: news/2026-03-10_news.csv
    currency: USD
    impacts:
      - high
      - red
    buffer_min: 10
    timezone: Asia/Kolkata

monitoring:
  log_level: INFO
  state_save_interval_sec: 10 # Very frequent for live
  enable_console_logging: true
  
  alerts:
    kill_switch: true
    daily_loss_pct: 0.02 # Alert at 2% loss

data:
  timeframes:
    - 1m
    - 5m
    - 15m
    - 1h
  history_bars: 1000
  tick_buffer_size: 5000

portfolio:
  reconciliation_interval_sec: 30 # Check MT5 every 30s

file_bridge:
  enabled: true
  data_dir: "~/Library/Application Support/net.metaquotes.wine.metatrader5/drive_c/users/user/AppData/Roaming/MetaQuotes/Terminal/Common/Files"
  check_interval_ms: 100

shutdown:
  close_all_positions: true # Safety first in live
  save_state: true
