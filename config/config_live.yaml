# Live Trading Environment Configuration
# $5K Account Size - The5ers Challenge
# Rules: 5% daily loss ($250), 10% max trailing drawdown ($500), 8% profit target ($400)

environment: live

account:
  initial_balance: 200.0
  currency: USD
  leverage: 100

symbols:
  XAUUSD:
    enabled: true
    pip_value: 0.01
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
    value_per_lot: 100
    commission_per_lot: 0.0
  
  BTCUSD:
    enabled: false
    pip_value: 0.1
    min_lot: 0.01
    max_lot: 2.0
    lot_step: 0.01
    value_per_lot: 1
    commission_per_lot: 0.0

  ETHUSD:
    enabled: false
    pip_value: 0.01
    min_lot: 0.01
    max_lot: 2.0
    lot_step: 0.01
    value_per_lot: 1
    commission_per_lot: 0.0

risk:
  # STRICT LIVE RISK LIMITS
  # 5% Max Drawdown ($250)
  max_drawdown_pct: 0.10            # 10% Max Trailing Loss (The5ers)
  max_daily_loss_pct: 0.05          # 5% Max Daily Loss (The5ers)
  
  # 0.2% risk per trade ($10 on $5k)
  risk_per_trade_pct: 0.002         # $10 risk per trade
  
  # ABSOLUTE DOLLAR LOSS/PROFIT LIMITS
  absolute_max_loss_usd: 250        # Daily loss limit
  max_daily_profit_usd: 135         # $133.33/day to hit $400 in 3 days
  
  max_positions: 2                  # Restrict to two trades at a time
  max_daily_trades: 50
  max_exposure_per_symbol_pct: 5.0    # 500% - needed for small accounts on high-priced instruments (0.01 BTCUSD = ~$66k notional vs $154 equity)
  
  position_sizing:
    method: fixed_fractional
  
  circuit_breaker:
    enabled: true
    max_consecutive_losses: 5       # Was 3 → more runway
    cooldown_minutes: 15            # Was 60 → faster recovery

strategies:
  signal_cooldown_minutes: 5   # 5min for prop challenge (was 10m)
  primary_timeframe: 1m  # Keeping 1m as per user's success
  min_bars_required: 10  # Slightly more data for live stability
  
  regime_filter:
    enabled: true
    adx_period: 14       # Normalized for live
    adx_trend_threshold: 25
    adx_range_threshold: 20
    atr_period: 14
    atr_ma_period: 20
    use_hurst: true
    hurst_period: 100
    hurst_trend_threshold: 0.55
    hurst_range_threshold: 0.45
  
  breakout:
    enabled: true
    donchian_period: 20  # Use standard period for live
    confirmation_bars: 1 # Require 1 bar confirmation for safety
    rr_ratio: 1.5               # Was 2.0 → take profits sooner
    only_in_regime: TREND
    mtf_confirmation: true
    atr_stop_multiplier: 2.5        # Was 2.0 → wider stops, give room to breathe
    volume_confirmation: false       # Disabled: file bridge provides no volume data
    volume_ratio_min: 1.2            # Volume must be >= 1.2x 20-bar average
    rsi_overbought: 75               # Don't buy above RSI 75
    rsi_oversold: 25                 # Don't sell below RSI 25
  
  mean_reversion:
    enabled: true
    zscore_lookback: 20
    entry_threshold: 2.0
    exit_threshold: 0.5
    stop_threshold: 3.0
    rr_ratio: 2.0
    only_in_regime: RANGE
    mtf_confirmation: false
  
  # VWAP Deviation Strategy 
  vwap:
    enabled: true
    atr_multiplier: 1.5
    stop_atr_multiplier: 2.0
    atr_period: 14
    min_volume_ratio: 1.0
    only_in_regime: RANGE
  
  # Momentum Scalping Strategy 
  momentum:
    enabled: true
    rsi_period: 14
    ema_period: 20
    rr_ratio: 1.5               # Was 2.0 → take profits sooner
    atr_stop_multiplier: 2.0          # Was 1.2 → wider stops
    rsi_bull_threshold: 50
    rsi_bear_threshold: 50
    rsi_overbought: 75                # Don't buy above RSI 75
    rsi_oversold: 25                  # Don't sell below RSI 25
    adx_min_threshold: 20             # Require ADX >= 20 for momentum
    volume_confirmation: false         # Disabled: file bridge provides no volume data
    volume_ratio_min: 1.0             # Volume must be >= 1.0x average
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    only_in_regime: TREND
  
  # Kalman Regime-Switching Strategy (Instruct.md)
  kalman_regime:
    enabled: true              # ← Enabled for The5ers challenge
    kalman_q: 0.00001           # Process noise (lower = smoother)
    kalman_r: 0.01              # Measurement noise
    rv_window: 20               # Realized volatility window
    rv_ma_window: 100           # RV moving average for regime threshold
    zscore_window: 20           # OU z-score std window
    entry_threshold: 2.0        # |Z| threshold for range-mode entry
    trend_adx_min: 15           # Light ADX gate for trend mode (avoids dead-flat markets)
    atr_period: 14
    sl_atr_multiplier: 2.5      # Stop loss distance
    tp_atr_multiplier: 2.0      # Take profit distance
    news_filter: true           # Skip signals during news blackout

  # -- SMC ORDER BLOCK (OB) STRATEGY ------------------------------------------
  # Your manual edge coded as a 5-phase state machine:
  #   Phase 1: Bearish impulse from swing high -> OB zone formed
  #   Phase 2: Price re-enters OB zone
  #   Phase 3: Liquidity sweep (wick below OB low + close above it) <- KEY FILTER
  #   Phase 4: First buying candle appears after sweep
  #   Phase 5: Next candle breaks first buy candle's HIGH -> ENTRY
  #   SL = first buy candle low | TP = OB high + sellers' SL cluster (liquidity premium)
  # Disabled by default -- run backtest first, then enable if PF > 1.3
  smc_ob:
    enabled: true
    timeframe: 1m
    long_only: true
    swing_lookback: 5
    min_impulse_atr_mult: 0.5
    ob_max_age_bars: 120
    ob_touch_tolerance_atr: 1.0
    cooldown_bars: 3
    adx_min_threshold: 8
    use_ema_trend_filter: true
    ema_trend_period: 50
    liquidity_premium_mult: 15.0
    min_liquidity_premium_mult: 8.0
    max_sl_atr: 4.0
    min_sl_atr: 0.05
    require_fvg_confluence: true
    fvg_ob_proximity_atr: 2.0
    fvg_max_age_bars: 50

  # ── FIBONACCI RETRACEMENT GOLDEN ZONE ──────────────────────────────
  # Trades pullbacks into the 50%–61.8% Fibonacci retracement zone.
  # Disabled by default — backtest before enabling live.
  # big_trend tuned config (Apr 2026 sweep):
  # PF 1.75, WR 36.8%, DD 9.2%, 152 trades / 6mo on XAUUSD 5m — best risk-adjusted
  fibonacci_retracement:
    enabled: true
    timeframe: 5m
    swing_lookback: 5
    min_swing_atr_mult: 3.5          # was 2.0 — only BIG swings
    swing_max_age_bars: 100
    golden_zone_upper: 0.618
    golden_zone_lower: 0.50
    min_rejection_ratio: 0.55        # was 0.50
    adx_min_threshold: 25            # was 20 — skip weak trends
    adx_max_threshold: 70            # was 55 — allow strong trends
    rsi_overbought: 75
    rsi_oversold: 25
    ema_trend_period: 50
    atr_stop_multiplier: 1.5
    rr_ratio: 2.5
    cooldown_bars: 10                # was 8
    long_only: false
    only_in_regime: TREND
    min_strength: 0.0
    session_hours: null

trading_hours:
  sessions:
    # ── ASIA (Tokyo/Sydney) 00:00–07:00 UTC — low vol, range-fade alpha ──────
    - name: asia
      start: "00:00"
      end: "07:00"
      enabled: true
      lot_size_multiplier: 0.7
      strategies: [asia_range_fade, vwap, fibonacci_retracement, mini_medallion]

    # ── LONDON 07:00–12:00 UTC — breakout/trend bias ─────────────────────────
    - name: london
      start: "07:00"
      end: "12:00"
      enabled: true
      lot_size_multiplier: 1.0
      strategies: [breakout, sbr, kalman_regime, momentum, smc_ob, descending_channel_breakout, mini_medallion, fibonacci_retracement]

    # ── LONDON/NY OVERLAP 12:00–16:00 UTC — peak liquidity ───────────────────
    - name: overlap
      start: "12:00"
      end: "16:00"
      enabled: true
      lot_size_multiplier: 1.0
      strategies: [momentum, kalman_regime, breakout, sbr, mini_medallion, vwap, asia_range_fade, descending_channel_breakout, smc_ob, fibonacci_retracement]

    # ── NEW YORK 16:00–22:00 UTC — momentum/trend continuation ───────────────
    - name: new_york
      start: "16:00"
      end: "22:00"
      enabled: true
      lot_size_multiplier: 1.0
      strategies: [momentum, kalman_regime, breakout, sbr, mini_medallion, fibonacci_retracement, smc_ob]

    # ── LATE / DEAD ZONE 22:00–24:00 UTC — disabled (wide spreads) ───────────
    - name: late_ny
      start: "22:00"
      end: "23:59"
      enabled: false
      lot_size_multiplier: 0.5
      strategies: [mini_medallion, fibonacci_retracement]

  news_filter:
    enabled: true  # ALWAYS ON FOR LIVE
    csv_path: news/2026-04-23_news.csv
    currency: USD
    impacts:
      - high
      - red
    buffer_min: 10
    timezone: Asia/Kolkata

monitoring:
  log_level: INFO
  state_save_interval_sec: 10 # Very frequent for live
  enable_console_logging: true
  
  alerts:
    kill_switch: true
    daily_loss_pct: 0.02 # Alert at 2% loss

data:
  timeframes:
    - 1m
    - 5m
    - 15m
    - 1h
  history_bars: 1000
  tick_buffer_size: 5000

portfolio:
  reconciliation_interval_sec: 30 # Check MT5 every 30s

file_bridge:
  enabled: true
  data_dir: "~/Library/Application Support/net.metaquotes.wine.metatrader5/drive_c/users/user/AppData/Roaming/MetaQuotes/Terminal/Common/Files"
  check_interval_ms: 100

shutdown:
  close_all_positions: true # Safety first in live
  save_state: true
