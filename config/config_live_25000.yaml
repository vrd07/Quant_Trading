# Live Trading Environment Configuration
# $25,000 Account Size
# Rules: 1.2% daily loss ($295), 7% max trailing drawdown ($1,750)
# Risk per trade: $25 (0.10%) — 0.03 lot XAUUSD × 83 pip stop = $25
# Target profit:  $62.50 per trade (RR 2.5)
# News Trading: Restricted (±5 min around high-impact news)
# Overnight & Weekend Holding: Allowed
#
# Audit-hardened config (Apr 2026):
#   - Mini Medallion DISABLED (negative expectancy)
#   - Kalman long_only (SELL side loses money on Gold)
#   - Pre-trade daily loss budget gate (85%)
#   - Tightened circuit breaker (3 losses / 30 min)
#   - Full 3-strategy suite: Momentum + Kalman + Breakout

environment: live

account:
  initial_balance: 25000.0
  currency: USD
  leverage: 100

symbols:
  XAUUSD:
    enabled: true
    pip_value: 0.01
    min_lot: 0.03
    max_lot: 0.03
    lot_step: 0.01
    value_per_lot: 100
    commission_per_lot: 0.0
    leverage: 30
    min_stops_distance: 1.0
    max_spread: 3.5

  BTCUSD:
    enabled: false
    pip_value: 0.1
    min_lot: 0.01
    max_lot: 0.02
    lot_step: 0.01
    value_per_lot: 1
    commission_per_lot: 0.0
    leverage: 2
    min_stops_distance: 5.0
    max_spread: 15.0

  EURUSD:
    enabled: false
    pip_value: 0.00001
    min_lot: 0.01
    max_lot: 0.03
    lot_step: 0.01
    value_per_lot: 100000
    commission_per_lot: 0.0
    leverage: 100
    min_stops_distance: 0.00050
    max_spread: 0.00030

  US30:
    enabled: false
    pip_value: 1.0
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
    value_per_lot: 1
    commission_per_lot: 0.0
    leverage: 20
    max_spread: 5.0

  USOIL:
    enabled: false
    pip_value: 0.01
    min_lot: 0.01
    max_lot: 10.0
    lot_step: 0.01
    value_per_lot: 1000
    commission_per_lot: 0.0
    leverage: 10
    max_spread: 0.05

risk:
  # $25,000 Account Risk Parameters
  max_drawdown_pct: 0.07          # 7% Max Overall/Trailing Drawdown ($1,750)
  max_daily_loss_pct: 0.012       # 1.2% Max Daily Loss ($300)
  bypass_drawdown_limit: false    # Enforce drawdown limit

  # $25 risk per trade = 0.10% of $25,000
  # Basis: 0.03 lot XAUUSD × 83 pip stop × $10/pip/lot = $25
  risk_per_trade_pct: 0.001       # 0.10% = $25 per trade

  # ABSOLUTE DOLLAR LOSS/PROFIT LIMITS
  absolute_max_loss_usd: 295      # Daily loss limit — hard cap below $300
  max_drawdown_usd: 1475          # Overall drawdown limit ($1,750 with buffer)
  max_daily_profit_usd: 250       # Stop trading for the day once $250 profit hit
  daily_loss_budget_safety_pct: 0.85  # Pre-trade budget gate: reject if worst-case SL hit
                                      # would push daily loss past 85% of $295 = $250.75

  max_positions: 2
  max_daily_trades: 15            # Conservative — matches 50K audit standard
  max_exposure_per_symbol_pct: 5.0
  max_daily_wins: 8               # Stop trading once 8 wins hit

  position_sizing:
    method: fixed
    fixed_lots:
      XAUUSD: 0.03
      EURUSD: 0.01
      default: 0.01
  circuit_breaker:
    enabled: true
    max_consecutive_losses: 3      # Tightened — audit standard
    cooldown_minutes: 30
    loss_pause_consecutive: 2
    loss_pause_minutes: 30

  trailing_stop:
    enabled: true
    breakeven_atr_mult: 1.2
    lock_atr_mult: 2.0
    lock_fraction: 0.5
    ml_exhaustion_factor: 0.8

strategies:
  signal_cooldown_minutes: 5
  primary_timeframe: 1m
  min_bars_required: 5

  regime_filter:
    enabled: true
    adx_period: 14
    adx_trend_threshold: 25
    adx_range_threshold: 20
    atr_period: 14
    atr_ma_period: 20
    use_hurst: true
    hurst_period: 100
    hurst_trend_threshold: 0.55
    hurst_range_threshold: 0.45

  breakout:
    enabled: true                # Enabled — $25K large enough for 3 strategies
    timeframe: 5m
    donchian_period: 12             # v3: shorter channel (60 min) — faster breakout detection
    rr_ratio: 3.0                   # v3: wider TP — gold trends well, capture more per winner
    only_in_regime: TREND
    atr_stop_multiplier: 2.0        # v3: back to 2.0 — 1.5 was too tight, stops hit too early
    adx_min_threshold: 20           # v3: back to 20 — quality over quantity
    min_body_atr_ratio: 0.30        # v3: back to 0.30 — ensures quality breakout bars
    volume_confirmation: false
    rsi_overbought: 78              # v3: widened from 75 — let strong trends run
    rsi_oversold: 22                # v3: widened from 25
    atr_spike_mult: 1.8             # v3: relaxed from 1.5 — gold is volatile, allow more
    cooldown_bars: 2                # v3: reduced from 4 — more trade frequency
    bb_squeeze_enabled: true
    bb_squeeze_period: 20
    bb_squeeze_percentile: 70       # v3: relaxed from 60 — less restrictive entry
    bb_squeeze_lookback: 50
    htf_trend_enabled: true
    htf_ema_period: 21
    session_filter_enabled: true
    allowed_sessions: [[4,4],[7,8],[22,22]]  # v3: ONLY profitable hours
    close_position_pct: 0.35
    macd_confirmation: true
    ema_confirm_enabled: true
    ema_fast_period: 9
    ema_slow_period: 21

  mean_reversion:
    enabled: false
    zscore_lookback: 20
    entry_threshold: 2.0
    exit_threshold: 0.5
    stop_threshold: 3.0
    rr_ratio: 2.5
    only_in_regime: RANGE
    mtf_confirmation: false

  vwap:
    enabled: true               # v4: enabled as low-freq diversifier — PF 1.85, 50% WR (6mo)
    timeframe: 5m
    band_std_mult: 1.0          # v4: 2σ rarely touched on 5m gold → 1σ
    partial_std_mult: 0.3
    stop_atr_multiplier: 1.8
    atr_period: 14
    min_volume_ratio: 0.0
    rsi_oversold_entry: 45
    rsi_overbought_entry: 55
    cci_oversold_entry: -60
    cci_overbought_entry: 60
    cci_period: 20
    only_in_regime: RANGE
    allowed_hours: [2, 11, 15, 19]   # v4: data-driven net-positive UTC hours


  # ── PRIMARY STRATEGY ──────────────────────────────────────────────────────
  # Momentum v3: Session-filtered, wider SL, optimized for profitability
  momentum:
    enabled: true
    timeframe: 5m
    rsi_period: 14
    ema_period: 20
    rr_ratio: 2.0             # v3: lowered from 2.5 — improves TP hit rate
    atr_stop_multiplier: 2.0  # v3: widened from 1.5 — reduces false SL hits
    rsi_bull_threshold: 53
    rsi_bear_threshold: 47
    rsi_overbought: 78
    rsi_oversold: 22
    adx_min_threshold: 22       # v3: raised from 20
    volume_confirmation: false
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    ema_fast: 9
    ema_mid: 21
    ema_slow: 30
    rsi_slope_bars: 3
    min_signal_strength: 0.60   # v3: raised from 0.50
    min_signal_strength_sell: 0.65
    only_in_regime: TREND
    session_filter_enabled: true
    allowed_hours: [1, 3, 4, 5, 7, 8, 10, 16, 17, 22]

  # ── SECONDARY STRATEGY ────────────────────────────────────────────────────
  kalman_regime:
    enabled: true
    timeframe: 15m
    long_only: false                # Two-sided: SELL re-enabled with confidence-gated sizing
    kalman_q: 0.00001
    kalman_r: 0.01
    rv_window: 20
    rv_ma_window: 100
    zscore_window: 20
    entry_threshold: 2.0            # v2: lowered from 2.5 — more range entries
    trend_adx_min: 20               # v2: lowered from 22
    kalman_confirm_bars: 2          # Keep 2-bar confirmation (proven in v1)
    min_signal_strength: 0.50
    cooldown_bars: 2                # v2: 30 min cooldown (was 30 bars = 7.5hr!)
    atr_period: 14
    sl_atr_multiplier: 1.5
    tp_atr_multiplier: 8.0          # v2: 8x ATR TP — let big trends run
    news_filter: true
    # Confidence gate: signals with conf >= threshold may stack up to risk.max_positions;
    # signals below threshold are limited to 1 open kalman_regime position at a time.
    high_confidence_threshold: 90.0
    # Session filter widened to ≥ 7 trading hours/day (was 8 split across 4 windows).
    session_filter_enabled: true
    allowed_sessions: [[1,7],[15,17],[20,22]]   # 7 + 3 + 3 = 13 hours/day
    ema_confirm_enabled: false
    macd_confirmation: false
    kalman_accel_enabled: false
    stoch_confirm_enabled: false
    range_rsi_buy: 42
    range_rsi_sell: 58

  # Mini Medallion v2: +31% return, PF 1.59, DD 4.3% (backtest Jan 2025–Mar 2026)
  # v2 changes: long-only, session filter, lower threshold, higher RR, ADX filter
  mini_medallion:
    enabled: true                   # v5: backtest-validated tuning — 51% WR, PF 1.31, 6.9% annualized
    timeframe: 5m
    score_threshold: 3.5            # v5: stronger conviction gate
    cooldown_bars: 10
    risk_atr_multiplier: 2.2        # v5: widened SL — tight stops were noise-tagged (77% SL rate)
    rr_ratio: 1.2                   # v5: realistic TP on 5m (was 3.0 → never filled)
    long_only: true                 # Gold upward bias
    session_filter_enabled: true
    allowed_hours: [5, 7, 8]        # v5: per-hour backtest — only these 3 hours are net-positive
    adx_min_threshold: 22
    min_signal_strength: 0.0        # v5: strength had no predictive power
    weights:
      mean_reversion: 1.0
      momentum_burst: 1.2
      volatility_expansion: 1.3
      order_flow: 1.1
      liquidity_sweep: 1.5
      market_regime: 1.2
      volatility_regime: 0.6


  # ── STRUCTURE BREAK + RETEST (SBR) ─────────────────────────────────
  # v2: +5.30%, PF 1.88, DD 1.61% — EMA trend + session filter + strength gate
  sbr:
    enabled: true
    timeframe: 5m
    lookback_period: 20
    retest_tolerance_atr: 0.4
    min_rejection_ratio: 0.55
    retest_window_bars: 20
    adx_min_threshold: 22
    adx_max_threshold: 55
    rsi_overbought: 70
    rsi_oversold: 30
    atr_stop_multiplier: 1.2
    rr_ratio: 2.0
    cooldown_bars: 8
    long_only: false
    only_in_regime: TREND
    # v2 filters
    ema_trend_period: 50
    min_strength: 0.65
    session_hours: [5, 6, 7, 13, 16, 17, 22]

  # ── SUPPLY & DEMAND ZONE STRATEGY ─────────────────────────────────────────
  # Disabled by default — backtest before enabling live.
  supply_demand:
    enabled: false  # Backtest 2yr: PF 1.07, DD -8.56%, 34.7% WR — no tunable edge on XAUUSD. Fold-in to mini_medallion also hurt composite.
    timeframe: 5m
    # Zone formation — loosened to surface more setups on 5m XAUUSD
    min_impulse_atr_mult: 1.6   # Was 2.5
    zone_lookback_bars: 4
    zone_max_age_bars: 80
    max_active_zones: 5
    # Entry confirmation — relaxed but still quality-gated
    zone_touch_tolerance_atr: 0.5
    min_rejection_ratio: 0.40   # Was 0.55
    adx_min_threshold: 14       # Was 18
    rsi_overbought: 78
    rsi_oversold: 22
    ema_trend_period: 34
    long_only: false
    session_hours: [4, 5, 6, 7, 8, 9, 12, 13, 14, 15, 16, 17, 18, 19, 22]
    cooldown_bars: 4

  # ── ASIA RANGE FADE ───────────────────────────────────────────────────────
  # Fills UTC 09–13 (14:30–18:30 IST) dead window. Backtest 2025-01→2026-03:
  # 214 trades, WR 45.3%, PF 1.31, DD 1.6% on $10k.
  asia_range_fade:
    enabled: true
    timeframe: 5m
    session_hours: [9, 10, 11, 12, 13]
    lookback_bars: 20
    adx_max: 28.0
    bb_period: 20
    bb_width_window: 200
    bb_width_percentile: 0.60
    rsi_period: 14
    rsi_oversold: 35.0
    rsi_overbought: 65.0
    atr_period: 14
    atr_stop_multiplier: 1.5
    rr_ratio: 1.5
    cooldown_bars: 12
    long_only: false
    respect_ml_trend: true

trading_hours:
  sessions:
    # ── 24/7 ALL STRATEGIES ───────────────────────────────────────────────────
    - name: all_day
      start: "00:00"
      end: "23:59"
      enabled: true
      lot_size_multiplier: 1.0
      strategies: [momentum, kalman_regime, breakout, sbr, mini_medallion, vwap, supply_demand, asia_range_fade]

  news_filter:
    enabled: true
    csv_path: news/2026-04-16_news.csv
    currency: USD
    impacts:
      - high
      - red
    buffer_min: 5
    timezone: Asia/Kolkata

monitoring:
  log_level: INFO
  state_save_interval_sec: 10
  enable_console_logging: true
  alerts:
    kill_switch: true
    daily_loss_pct: 0.008

data:
  timeframes:
    - 1m
    - 5m
    - 15m
    - 1h
  history_bars: 1000
  tick_buffer_size: 5000

portfolio:
  reconciliation_interval_sec: 30

file_bridge:
  enabled: true
  data_dir: "~/Library/Application Support/net.metaquotes.wine.metatrader5/drive_c/users/user/AppData/Roaming/MetaQuotes/Terminal/Common/Files"
  check_interval_ms: 100

shutdown:
  close_all_positions: true
  save_state: true
